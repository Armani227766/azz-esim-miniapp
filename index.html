<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eSIM Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    :root {
      --bg-base: #07080d;
      --bg-deep: #0a0b12;
      --bg-card: rgba(16, 18, 27, 0.9);
      --bg-card-2: rgba(20, 22, 34, 0.95);
      --accent: #a875ff;
      --accent-2: #7b61ff;
      --accent-glow: rgba(168, 117, 255, 0.24);
      --text-main: #f7f7fb;
      --text-soft: #d7d8e3;
      --text-muted: #8e91a3;
      --border-subtle: rgba(255,255,255,0.07);
      --success: #32d583;
      --danger: #ff5b6e;
      --shadow-lg: 0 18px 50px rgba(0,0,0,0.45);
      --shadow-md: 0 10px 24px rgba(0,0,0,0.28);
      --radius-xl: 26px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      background:
        radial-gradient(circle at 50% 10%, rgba(123,97,255,0.18), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(168,117,255,0.16), transparent 30%),
        linear-gradient(180deg, #05060a 0%, #090b13 46%, #06070c 100%);
      color: var(--text-main);
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      padding-bottom: 34px;
    }

    .page-shell {
      position: relative;
    }

    .page-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 22%, rgba(168,117,255,0.08), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(76,52,168,0.08), transparent 30%);
      z-index: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 16px 16px 10px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(6,7,12,0.88), rgba(6,7,12,0.54), transparent);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 10px;
      max-width: 460px;
      margin: 0 auto;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border-subtle);
      background: rgba(17, 19, 28, 0.7);
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .brand-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 0 auto;
      padding: 8px 14px 20px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 18px 18px 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at 50% 8%, rgba(168,117,255,0.24), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(136,92,255,0.34), transparent 38%),
        linear-gradient(180deg, rgba(17,18,29,0.96) 0%, rgba(11,12,18,0.98) 100%);
      box-shadow: 0 14px 34px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.04);
      margin-bottom: 14px;
      min-height: 190px;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -54px;
      transform: translateX(-50%);
      width: 132%;
      height: 132px;
      border-radius: 50%;
      border: 1px solid rgba(184,154,255,0.22);
      box-shadow: 0 0 26px rgba(168,117,255,0.18), 0 0 50px rgba(123,97,255,0.14);
      opacity: 0.95;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 35%, transparent 60%, rgba(168,117,255,0.05));
      pointer-events: none;
    }

    .hero-chip {
      width: 46px;
      height: 46px;
      margin: 0 auto 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #dacfff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 24px rgba(90,65,180,0.18);
      position: relative;
      z-index: 1;
    }

    .hero-label {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #bab7c9;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .hero-balance {
      text-align: center;
      font-size: 62px;
      line-height: 0.95;
      font-weight: 760;
      letter-spacing: -0.06em;
      color: #fafaff;
      text-shadow: 0 0 16px rgba(168,117,255,0.1);
      position: relative;
      z-index: 1;
    }

    .hero-balance span {
      font-size: 22px;
      color: #cfd0dc;
      font-weight: 600;
      margin-left: 4px;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .action-pill {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(19,20,31,0.92), rgba(12,13,22,0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 18px rgba(0,0,0,0.24);
      min-height: 54px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .action-pill i {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #cfbeff;
      background: rgba(168,117,255,0.08);
      box-shadow: 0 0 12px rgba(168,117,255,0.1);
      font-size: 12px;
    }

    .action-pill.secondary {
      opacity: 0.9;
    }

    .filter-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      margin-bottom: 14px;
      scrollbar-width: none;
    }

    .filter-strip::-webkit-scrollbar { display: none; }

    .filter-chip {
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(20,22,33,0.82);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }

    .provider-section {
      margin-bottom: 18px;
    }

    .provider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px 10px;
    }

    .provider-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .provider-header i {
      color: #c28cff;
      font-size: 18px;
      text-shadow: 0 0 12px rgba(168,117,255,0.18);
    }

    .provider-title {
      font-size: 17px;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .provider-meta {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .products-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .product-card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(17,18,28,0.97) 0%, rgba(10,11,19,0.99) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      min-height: 178px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 26px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .product-card::before {
      content: "";
      position: absolute;
      left: -20%;
      right: -20%;
      bottom: -54px;
      height: 90px;
      border-radius: 50%;
      border-top: 1px solid rgba(168,117,255,0.22);
      box-shadow: 0 -10px 26px rgba(123,97,255,0.08);
      opacity: 0.8;
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .product-name {
      font-size: 15px;
      font-weight: 720;
      line-height: 1.15;
      color: var(--text-main);
    }

    .product-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 800;
      color: #e8ddff;
      letter-spacing: 0.05em;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(168,117,255,0.18);
      background: rgba(168,117,255,0.1);
    }

    .product-desc {
      font-size: 12px;
      line-height: 1.35;
      color: #a8abbb;
      margin-bottom: 16px;
      min-height: 32px;
    }

    .price-zone {
      margin-top: auto;
      margin-bottom: 12px;
    }

    .price-tag {
      font-size: 16px;
      color: #c8c9d6;
      margin-bottom: 2px;
    }

    .price-main {
      font-size: 18px;
      font-weight: 780;
      letter-spacing: -0.03em;
      color: #f7f6ff;
    }

    .btn-buy {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(168,117,255,0.18);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(34,35,47,0.96), rgba(20,21,31,0.98));
      color: #f1f1f6;
      font-size: 14px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 0 14px rgba(168,117,255,0.08);
    }

    .btn-buy:active,
    .action-pill:active,
    .icon-btn:active,
    .filter-chip:active,
    .btn-primary:active,
    .step-btn:active {
      transform: scale(0.97);
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,5,10,0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all .28s ease;
    }

    .sheet-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: -100%;
      z-index: 1001;
      background: linear-gradient(180deg, rgba(18,19,29,0.98), rgba(10,11,18,1));
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 18px 18px 28px;
      box-shadow: 0 -24px 48px rgba(0,0,0,0.55);
      transition: bottom .38s cubic-bezier(.22,.9,.3,1);
    }

    .bottom-sheet.active { bottom: 0; }

    .sheet-handle {
      width: 44px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      margin: 0 auto 18px;
    }

    .sheet-title {
      font-size: 22px;
      font-weight: 760;
      text-align: center;
      margin-bottom: 8px;
    }

    .sheet-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.4;
    }

    .input-styled {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(7,8,13,0.88);
      color: var(--text-main);
      font-size: 16px;
      padding: 0 16px;
      outline: none;
      margin-bottom: 16px;
    }

    .input-styled:focus {
      border-color: rgba(168,117,255,0.38);
      box-shadow: 0 0 0 4px rgba(168,117,255,0.08);
    }

    .btn-primary {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(168,117,255,0.22);
      background: linear-gradient(180deg, rgba(39,40,54,0.98), rgba(23,24,33,1));
      color: #f2f2f8;
      font-size: 15px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 18px rgba(168,117,255,0.08);
    }

    .receipt-box {
      background: rgba(8,9,15,0.92);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .receipt-row:last-child {
      margin-bottom: 0;
      padding-top: 12px;
      border-top: 1px dashed rgba(255,255,255,0.1);
      font-weight: 760;
      font-size: 18px;
    }

    .stepper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(8,9,15,0.92);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 8px;
      margin-bottom: 16px;
    }

    .step-btn {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(168,117,255,0.18);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(35,36,48,0.96), rgba(21,22,30,0.98));
      color: #fff;
      font-size: 19px;
    }

    .step-val {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-main);
    }

    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-16px);
      z-index: 9999;
      background: rgba(18,19,29,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
      color: var(--text-main);
      opacity: 0;
      visibility: hidden;
      transition: all .28s ease;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .toast i { color: #c28cff; }

    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(7,8,13,0.72);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      transition: opacity .6s ease, visibility .6s ease, transform .6s ease;
    }

    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.04);
    }

    .splash-logo-container {
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .splash-logo-img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(168,117,255,0.18));
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 390px) {
      .hero-balance { font-size: 54px; }
      .products-row { gap: 10px; }
      .product-card { padding: 13px; }
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="splash-logo-container">
      <img src="1000007639.png" alt="eSim Market Logo" class="splash-logo-img" id="customLogo" />
    </div>
    <div class="spinner"></div>
  </div>

  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="icon-btn" type="button" aria-label="Menú">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="brand-title">eSim Market</div>
        <button class="icon-btn" type="button" aria-label="Perfil">
          <i class="fa-regular fa-user"></i>
        </button>
      </div>
    </header>

    <main class="content">
      <section class="hero-card">
        <div class="hero-chip"><i class="fa-solid fa-sim-card"></i></div>
        <div class="hero-label">Fondos disponibles</div>
        <div class="hero-balance" id="balance-display">0,00 <span>€</span></div>
      </section>

      <section class="quick-actions">
        <button class="action-pill" onclick="openSheet('rechargeSheet')">
          <i class="fa-solid fa-plus"></i><span>Recargar</span>
        </button>
        <button class="action-pill" onclick="openSheet('couponSheet')">
          <i class="fa-solid fa-ticket"></i><span>Cupones</span>
        </button>
        <button class="action-pill secondary" onclick="tg.close()">
          <i class="fa-solid fa-xmark"></i><span>Salir</span>
        </button>
      </section>

      <section class="filter-strip">
        <button class="filter-chip" type="button">Baratas</button>
        <button class="filter-chip" type="button">Más datos</button>
        <button class="filter-chip" type="button">Europa</button>
      </section>

      <div id="providersContainer"></div>
    </main>
  </div>

  <div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>

  <div class="bottom-sheet" id="rechargeSheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Añadir Fondos</h2>
    <p class="sheet-subtitle">Introduce la cantidad que deseas depositar</p>
    <input type="number" id="recharge-amount" class="input-styled" placeholder="0.00" min="10" step="1" />
    <button class="btn-primary" onclick="tg.HapticFeedback.impactOccurred('medium'); confirmRecharge()">Continuar al Pago</button>
  </div>

  <div class="bottom-sheet" id="couponSheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Canjear Cupón</h2>
    <p class="sheet-subtitle">Introduce el código promocional</p>
    <input type="text" id="coupon-code" class="input-styled" placeholder="CÓDIGO" />
    <button class="btn-primary" onclick="tg.HapticFeedback.impactOccurred('medium'); applyCoupon()">Validar Código</button>
  </div>

  <div class="bottom-sheet" id="purchaseSheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Confirmar Compra</h2>
    <div class="stepper">
      <button class="step-btn" onclick="updatePurchaseQty(-1)">−</button>
      <div class="step-val"><span id="review-qty">1</span> uds.</div>
      <button class="step-btn" onclick="updatePurchaseQty(1)">+</button>
    </div>

    <div class="receipt-box">
      <div class="receipt-row"><span style="color: var(--text-muted);">Producto</span><span id="review-name" style="font-weight:600;">Vodafone 90GB</span></div>
      <div class="receipt-row"><span style="color: var(--text-muted);">Precio Ud.</span><span id="review-unit-price">12,99 €</span></div>
      <div class="receipt-row"><span>Total a pagar</span><span id="review-total">12,99 €</span></div>
    </div>

    <button class="btn-primary" onclick="tg.HapticFeedback.impactOccurred('medium'); executePurchase()" id="btn-execute">Confirmar Pago</button>
  </div>

  <div class="toast" id="toastMsg">
    <i class="fa-solid fa-circle-info"></i>
    <span id="toastText">Mensaje</span>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#07080d');
    tg.setBackgroundColor('#07080d');

    let userBalance = 0;
    let products = [];
    let currentPurchase = { id: null, qty: 1, basePrice: 0, hasBulkDiscount: false, tiers: [], name: '' };

    function initApp() {
      const urlParams = new URLSearchParams(window.location.search);
      userBalance = parseFloat(urlParams.get('balance')) || 0;
      updateBalanceUI();

      const productsRaw = urlParams.get('products');
      if (productsRaw) {
        try {
          const decoded = decodeURIComponent(productsRaw);
          const botProducts = JSON.parse(atob(decoded));
          products = botProducts.map(p => ({
            id: p.id,
            name: p.name,
            description: p.description || 'Conexión premium',
            basePrice: parseFloat(p.unit_price) || 0,
            hasBulkDiscount: p.id === 'vodafone' || p.id === 'lebara',
            tiers: p.id === 'vodafone' || p.id === 'lebara'
              ? [{ min: 20, price: 10 }, { min: 10, price: 11 }, { min: 5, price: 12 }, { min: 2, price: 12.5 }]
              : []
          }));
        } catch (e) {
          console.error('Error parseando products:', e);
        }
      }

      if (products.length === 0) {
        products = [
          { id: 'vodafone', name: 'Vodafone', description: '90GB · llamadas ilimitadas', basePrice: 12.99, hasBulkDiscount: true, tiers: [{ min: 2, price: 12.5 }] },
          { id: 'vodafone_plus', name: 'Vodafone+', description: '270GB · 1000 min internacionales', basePrice: 16.99, hasBulkDiscount: false, tiers: [] },
          { id: 'lebara', name: 'Lebara', description: '90GB · llamadas ilimitadas', basePrice: 12.99, hasBulkDiscount: true, tiers: [{ min: 2, price: 12.5 }] },
          { id: 'lebara_plus', name: 'Lebara+', description: '270GB · 1000 min internacionales', basePrice: 16.99, hasBulkDiscount: false, tiers: [] }
        ];
      }

      renderProviders();
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
      }, 800);
    }

    function formatPrice(val) {
      return (val || 0).toFixed(2).replace('.', ',') + ' €';
    }

    function updateBalanceUI() {
      document.getElementById('balance-display').innerHTML = `${(userBalance || 0).toFixed(2).replace('.', ',')} <span>€</span>`;
    }

    function showToast(msg) {
      const t = document.getElementById('toastMsg');
      document.getElementById('toastText').innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openSheet(id) {
      document.getElementById('overlay').classList.add('active');
      document.getElementById(id).classList.add('active');
    }

    function closeAllSheets() {
      document.getElementById('overlay').classList.remove('active');
      document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
    }

    function getProviderName(productName) {
      const name = (productName || '').toLowerCase();
      if (name.includes('vodafone')) return 'Vodafone';
      if (name.includes('lebara')) return 'Lebara';
      if (name.includes('movistar')) return 'Movistar';
      if (name.includes('orange')) return 'Orange';
      return 'Otras Tarifas';
    }

    function getProviderIcon(provider) {
      if (provider === 'Vodafone') return 'fa-bolt';
      if (provider === 'Lebara') return 'fa-globe';
      if (provider === 'Movistar') return 'fa-m';
      return 'fa-signal';
    }

    function getBadgeText(product) {
      if (product.hasBulkDiscount) return 'OFERTA';
      if ((product.name || '').toLowerCase().includes('plus')) return 'TOP';
      return '';
    }

    function renderProviders() {
      const grouped = products.reduce((acc, p) => {
        const provider = getProviderName(p.name);
        if (!acc[provider]) acc[provider] = [];
        acc[provider].push(p);
        return acc;
      }, {});

      const container = document.getElementById('providersContainer');
      let html = '';

      for (const [provider, items] of Object.entries(grouped)) {
        html += `
          <section class="provider-section">
            <div class="provider-header">
              <div class="provider-left">
                <i class="fa-solid ${getProviderIcon(provider)}"></i>
                <div class="provider-title">${provider}</div>
              </div>
              <div class="provider-meta">${items.length} tarifas</div>
            </div>
            <div class="products-row">
              ${items.map(p => {
                const badge = getBadgeText(p) ? `<div class="product-badge">${getBadgeText(p)}</div>` : '';
                return `
                  <article class="product-card" onclick="tg.HapticFeedback.impactOccurred('light'); initPurchase('${p.id}')">
                    <div class="card-top">
                      <div class="product-name">${p.name}</div>
                      ${badge}
                    </div>
                    <div class="product-desc">${p.description}</div>
                    <div class="price-zone">
                      <div class="price-main">${formatPrice(p.basePrice)}</div>
                    </div>
                    <button class="btn-buy" onclick="event.stopPropagation(); tg.HapticFeedback.impactOccurred('light'); initPurchase('${p.id}')">Comprar</button>
                  </article>
                `;
              }).join('')}
            </div>
          </section>
        `;
      }

      container.innerHTML = html;
    }

    function getUnitPrice(prod, qty) {
      if (!prod.hasBulkDiscount) return prod.basePrice;
      for (let t of prod.tiers) {
        if (qty >= t.min) return t.price;
      }
      return prod.basePrice;
    }

    function initPurchase(id) {
      const p = products.find(x => String(x.id) === String(id));
      if (!p) return;
      currentPurchase = { ...p, qty: 1 };
      updatePurchaseUI();
      openSheet('purchaseSheet');
    }

    function updatePurchaseQty(delta) {
      tg.HapticFeedback.impactOccurred('light');
      let newQty = currentPurchase.qty + delta;
      if (newQty < 1) newQty = 1;
      if (newQty > 50) newQty = 50;
      currentPurchase.qty = newQty;
      updatePurchaseUI();
    }

    function updatePurchaseUI() {
      const unitP = getUnitPrice(currentPurchase, currentPurchase.qty);
      const totalP = unitP * currentPurchase.qty;
      document.getElementById('review-qty').innerText = currentPurchase.qty;
      document.getElementById('review-name').innerText = currentPurchase.name;
      document.getElementById('review-unit-price').innerText = formatPrice(unitP);
      document.getElementById('review-total').innerText = formatPrice(totalP);

      const btn = document.getElementById('btn-execute');
      if (userBalance < totalP) {
        btn.style.background = 'rgba(20,21,29,0.96)';
        btn.style.color = 'var(--danger)';
        btn.style.border = '1px solid var(--danger)';
        btn.innerText = 'Saldo insuficiente';
        btn.onclick = () => showToast('Recarga saldo primero');
      } else {
        btn.style.background = 'linear-gradient(180deg, rgba(39,40,54,0.98), rgba(23,24,33,1))';
        btn.style.color = '#f2f2f8';
        btn.style.border = '1px solid rgba(168,117,255,0.22)';
        btn.innerText = 'Confirmar Pago';
        btn.onclick = executePurchase;
      }
    }

    function executePurchase() {
      const unitP = getUnitPrice(currentPurchase, currentPurchase.qty);
      const totalP = unitP * currentPurchase.qty;
      const originalTotal = currentPurchase.basePrice * currentPurchase.qty;
      if (userBalance < totalP) {
        showToast('Saldo insuficiente');
        return;
      }
      const payload = {
        type: 'purchase',
        productId: currentPurchase.id,
        productName: currentPurchase.name,
        quantity: currentPurchase.qty,
        unitPrice: unitP,
        totalPrice: totalP,
        originalTotal: originalTotal,
        discountAmount: originalTotal - totalP
      };
      tg.sendData(JSON.stringify(payload));
      tg.close();
    }

    function confirmRecharge() {
      const val = parseFloat(document.getElementById('recharge-amount').value);
      if (isNaN(val) || val <= 0) {
        showToast('Importe inválido');
        return;
      }
      tg.sendData(JSON.stringify({ type: 'add_balance', amount: val }));
      tg.close();
    }

    function applyCoupon() {
      const code = document.getElementById('coupon-code').value.trim();
      if (!code) {
        showToast('Introduce un código');
        return;
      }
      tg.sendData(JSON.stringify({ type: 'apply_coupon', code }));
      tg.close();
    }

    initApp();
  </script>
</body>
</html>
