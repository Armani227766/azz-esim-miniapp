<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eSim's Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      color: #94a3b8;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }

    .note {
      margin-top: 24px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛍 eSim's Bot</h1>
      <p>Compra tu eSIM de forma rápida desde Telegram.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Vodafone</h2>
        <div class="meta">90GB · Llamadas ilimitadas</div>
        <div class="price">12,99 €</div>
        <button class="btn" onclick="selectPlan('España 5GB')">Seleccionar</button>
      </div>

      <div class="card">
        <h2>Lebara</h2>
        <div class="meta">90GB · Llamadas ilimitadas · QR 1 SOLO USO!!</div>
        <div class="price">12,99 €</div>
        <button class="btn" onclick="selectPlan('Europa 10GB')">Seleccionar</button>
      </div>

      <div class="card">
        <h2>Vodafone+</h2>
        <div class="meta">270GB · 1000 min internacionales</div>
        <div class="price">16.99 €</div>
        <button class="btn" onclick="selectPlan('Vodafone+')">Comprar</button>
      </div>
    </div>

    <div class="note">
      Versión demo de la tienda. El pago real llegará después.
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let selectedPlan = "";

  tg.MainButton.hide();

  function selectPlan(plan) {
    selectedPlan = plan;
    tg.MainButton.setText("Comprar " + plan);
    tg.MainButton.show();
    tg.MainButton.enable();
  }

  tg.onEvent("mainButtonClicked", function () {
    if (!selectedPlan) {
      tg.showAlert("Primero selecciona una eSIM.");
      return;
    }

    const data = JSON.stringify({
      plan: selectedPlan
    });

    tg.sendData(data);
    tg.close();
  });
</script>
</body>
</html>
