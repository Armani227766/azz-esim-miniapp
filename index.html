  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eSIM Wallet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      color: #111;
      padding: 16px;
    }

    .wallet {
      background: #111;
      color: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .wallet h2 {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .balance {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .add-balance-btn {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-bottom: 6px;
      font-size: 20px;
    }

    .card p {
      color: #555;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .base-price {
      font-size: 15px;
      color: #666;
      margin-bottom: 12px;
    }

    .qty-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .qty-row label {
      font-size: 14px;
      font-weight: 600;
    }

    .qty-row input,
    .modal-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    .summary {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .summary-small {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .summary-total {
      font-size: 22px;
      font-weight: bold;
      color: #111;
    }

    .buy-btn {
      width: 100%;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .modal.hidden {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-box {
      background: white;
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      padding: 20px;
    }

    .modal-box h3 {
      margin-bottom: 8px;
    }

    .modal-box p {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }

    #balanceAmount {
      margin-bottom: 8px;
    }

    .error {
      color: #d60000;
      font-size: 14px;
      min-height: 18px;
      margin-bottom: 10px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .cancel-btn {
      background: #eaeaea;
      color: #111;
    }

    .confirm-btn {
      background: #2ecc71;
      color: white;
    }
  </style>
</head>
<body>
  <div class="wallet">
    <h2>Saldo</h2>
    <div class="balance" id="balance">0,00 €</div>
    <button class="add-balance-btn" onclick="openAddBalanceModal()">+ Añadir saldo</button>
  </div>

  <div class="cards" id="cards"></div>

  <div id="addBalanceModal" class="modal hidden">
    <div class="modal-box">
      <h3>Añadir saldo</h3>
      <p>Introduce un importe entre 10 € y 200 €.</p>
      <input
        id="balanceAmount"
        type="number"
        min="10"
        max="200"
        step="1"
        placeholder="Ej: 25"
      />
      <div id="balanceError" class="error"></div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeAddBalanceModal()">Cancelar</button>
        <button class="confirm-btn" onclick="confirmAddBalance()">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="confirmPurchaseModal" class="modal hidden">
    <div class="modal-box">
      <h3>Confirmar compra</h3>
      <p>Revisa los datos antes de completar la compra.</p>
      <div class="summary">
        <div class="summary-small" id="confirmProduct">Producto: -</div>
        <div class="summary-small" id="confirmQuantity">Cantidad: -</div>
        <div class="summary-small" id="confirmUnitPrice">Precio unitario: -</div>
        <div class="summary-small" id="confirmOriginalTotal">Total sin descuento: -</div>
        <div class="summary-small" id="confirmDiscount">Descuento aplicado: -</div>
        <div class="summary-small" id="confirmBalanceBefore">Saldo actual: -</div>
        <div class="summary-total" id="confirmTotal">Total: -</div>
        <div class="summary-small" id="confirmBalanceAfter">Saldo después: -</div>
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeConfirmPurchaseModal()">Cancelar</button>
        <button class="confirm-btn" onclick="confirmPurchase()">Confirmar compra</button>
      </div>
    </div>
  </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. LEER EL SALDO ENVIADO POR EL BOT DESDE LA URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlBalance = parseFloat(urlParams.get('balance'));
    let userBalance = isNaN(urlBalance) ? 0 : urlBalance;
    
    let pendingPurchase = null;

    const products = [
      {
        id: "vodafone",
        name: "Vodafone",
        description: "90GB · Llamadas ilimitadas",
        basePrice: 12.99,
        hasBulkDiscount: true,
        tiers: [
          { min: 20, unitPrice: 10 },
          { min: 10, unitPrice: 11 },
          { min: 5, unitPrice: 12 },
          { min: 2, unitPrice: 12.5 }
        ]
      },
      {
        id: "lebara",
        name: "Lebara",
        description: "90GB · Llamadas ilimitadas · QR 1 SOLO USO!!",
        basePrice: 12.99,
        hasBulkDiscount: true,
        tiers: [
          { min: 20, unitPrice: 10 },
          { min: 10, unitPrice: 11 },
          { min: 5, unitPrice: 12 },
          { min: 2, unitPrice: 12.5 }
        ]
      },
      {
        id: "vodafoneplus",
        name: "Vodafone+",
        description: "270GB · 1000 min internacionales",
        basePrice: 16.99,
        hasBulkDiscount: false,
        tiers: []
      }
    ];

    function formatPrice(value) {
      return value.toFixed(2).replace(".", ",") + " €";
    }

    function updateBalanceUI() {
      document.getElementById("balance").textContent = formatPrice(userBalance);
    }

    function getUnitPrice(product, quantity) {
      if (!product.hasBulkDiscount) return product.basePrice;
      for (const tier of product.tiers) {
        if (quantity >= tier.min) {
          return tier.unitPrice;
        }
      }
      return product.basePrice;
    }

    function getTotalPrice(product, quantity) {
      return getUnitPrice(product, quantity) * quantity;
    }

    function renderProducts() {
      const container = document.getElementById("cards");
      container.innerHTML = products.map(product => {
        return `
          <div class="card">
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <div class="base-price">Precio base: ${formatPrice(product.basePrice)}</div>
            <div class="qty-row">
              <label for="qty-${product.id}">Cantidad</label>
              <input
                id="qty-${product.id}"
                type="number"
                min="1"
                step="1"
                value="1"
                oninput="updateProductSummary('${product.id}')"
              />
            </div>
            <div class="summary">
              <div class="summary-total" id="total-${product.id}">
                Total: ${formatPrice(product.basePrice)}
              </div>
            </div>
            <button class="buy-btn" onclick="buyProduct('${product.id}')">Comprar</button>
          </div>
        `;
      }).join("");

      products.forEach(product => updateProductSummary(product.id));
    }

    function updateProductSummary(productId) {
      const product = products.find(p => p.id === productId);
      const input = document.getElementById(`qty-${productId}`);
      let quantity = parseInt(input.value, 10);

      if (isNaN(quantity) || quantity < 1) {
        quantity = 1;
        input.value = 1;
      }

      const totalPrice = getTotalPrice(product, quantity);
      document.getElementById(`total-${productId}`).textContent = `Total: ${formatPrice(totalPrice)}`;
    }

    function buyProduct(productId) {
      const product = products.find(p => p.id === productId);
      const input = document.getElementById(`qty-${productId}`);
      let quantity = parseInt(input.value, 10);

      if (isNaN(quantity) || quantity < 1) {
        quantity = 1;
        input.value = 1;
      }

      const totalPrice = getTotalPrice(product, quantity);

      if (userBalance < totalPrice) {
        const missingRaw = totalPrice - userBalance;
        let suggestedAmount = Math.ceil(missingRaw);
        if (suggestedAmount < 10) suggestedAmount = 10;
        if (suggestedAmount > 200) suggestedAmount = 200;

        tg.showAlert(`No tienes saldo suficiente. Te faltan ${formatPrice(missingRaw)}.`);
        openAddBalanceModal(suggestedAmount);
        return;
      }

      const unitPrice = getUnitPrice(product, quantity);
      const originalTotal = product.basePrice * quantity;
      const discountAmount = originalTotal - totalPrice;

      pendingPurchase = {
        productId: product.id,
        productName: product.name,
        quantity,
        unitPrice,
        originalTotal,
        discountAmount,
        totalPrice
      };

      openConfirmPurchaseModal();
    }

    function openConfirmPurchaseModal() {
      if (!pendingPurchase) return;

      const balanceAfter = userBalance - pendingPurchase.totalPrice;

      document.getElementById("confirmProduct").textContent = `Producto: ${pendingPurchase.productName}`;
      document.getElementById("confirmQuantity").textContent = `Cantidad: ${pendingPurchase.quantity}`;
      document.getElementById("confirmUnitPrice").textContent = `Precio unitario: ${formatPrice(pendingPurchase.unitPrice)}`;
      document.getElementById("confirmOriginalTotal").textContent = `Total sin descuento: ${formatPrice(pendingPurchase.originalTotal)}`;
      document.getElementById("confirmDiscount").textContent = `Descuento aplicado: ${formatPrice(pendingPurchase.discountAmount)}`;
      document.getElementById("confirmBalanceBefore").textContent = `Saldo actual: ${formatPrice(userBalance)}`;
      document.getElementById("confirmTotal").textContent = `Total: ${formatPrice(pendingPurchase.totalPrice)}`;
      document.getElementById("confirmBalanceAfter").textContent = `Saldo después: ${formatPrice(balanceAfter)}`;

      document.getElementById("confirmPurchaseModal").classList.remove("hidden");
    }

    function closeConfirmPurchaseModal() {
      document.getElementById("confirmPurchaseModal").classList.add("hidden");
    }

    function confirmPurchase() {
      if (!pendingPurchase) return;

      const payload = {
        type: "purchase",
        productId: pendingPurchase.productId,
        productName: pendingPurchase.productName,
        quantity: pendingPurchase.quantity,
        unitPrice: pendingPurchase.unitPrice,
        originalTotal: pendingPurchase.originalTotal,
        discountAmount: pendingPurchase.discountAmount,
        totalPrice: pendingPurchase.totalPrice
      };

      // Enviamos el pedido al bot y Telegram cerrará automáticamente la ventana
      tg.sendData(JSON.stringify(payload));
    }

    function openAddBalanceModal(suggestedAmount = "") {
      document.getElementById("addBalanceModal").classList.remove("hidden");
      document.getElementById("balanceError").textContent = "";
      const input = document.getElementById("balanceAmount");

      if (suggestedAmount !== "") {
        let safeAmount = suggestedAmount;
        if (safeAmount < 10) safeAmount = 10;
        if (safeAmount > 200) safeAmount = 200;
        input.value = safeAmount;
      } else {
        input.value = "";
      }
    }

    function closeAddBalanceModal() {
      document.getElementById("addBalanceModal").classList.add("hidden");
    }

    function confirmAddBalance() {
      const input = document.getElementById("balanceAmount");
      const error = document.getElementById("balanceError");
      const amount = Number(input.value);

      error.textContent = "";

      if (!input.value) {
        error.textContent = "Introduce una cantidad.";
        return;
      }
      if (amount < 10) {
        error.textContent = "El mínimo para añadir saldo es 10 €.";
        return;
      }
      if (amount > 200) {
        error.textContent = "El máximo para añadir saldo es 200 €.";
        return;
      }

      const payload = {
        type: "add_balance",
        amount: amount
      };

      // Enviamos la orden de recarga al bot y se cierra la ventana
      tg.sendData(JSON.stringify(payload));
    }

    // Inicializar valores al cargar
    updateBalanceUI();
    renderProducts();
  </script>
</body>
</html>
