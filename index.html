<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AZZ eSIM | Cyber Terminal</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Fuentes tecnológicas -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
        .header-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 24px;
    }
    .header-logo img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 0 25px var(--neon-purple-glow);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }
    :root {
      --bg-deep: #05030A;
      --panel-bg: #0D0A14;
      --neon-purple: #A855F7;
      --neon-purple-glow: rgba(168, 85, 247, 0.4);
      --neon-blue: #00F0FF;
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --success: #10B981;
      --danger: #EF4444;
      --transition: all 0.2s ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(168,85,247,0.15) 0%, transparent 50%),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 20px 20px, 20px 20px;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      padding: 20px 16px 80px;
      min-height: 100vh;
    }

    h1, h2, h3, .cyber-number {
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
    }

    /* --- CABECERA Y LOGO --- */
    .header-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }
    .header-logo img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 0 25px var(--neon-purple-glow);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    /* --- PANEL DE SALDO (WALLET) --- */
    .wallet-panel {
      background: var(--panel-bg);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px var(--neon-purple-glow), inset 0 0 10px rgba(0,0,0,0.5);
    }

    .wallet-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--neon-purple);
      box-shadow: 0 0 10px var(--neon-purple);
    }

    .wallet-label {
      font-size: 12px;
      color: var(--neon-purple);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .balance-val {
      font-size: 42px;
      font-weight: 700;
      color: #FFF;
      text-shadow: 0 0 15px var(--neon-purple-glow);
      margin-bottom: 16px;
    }

    .btn-cyber {
      width: 100%;
      background: transparent;
      color: var(--neon-purple);
      border: 1px solid var(--neon-purple);
      padding: 14px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-cyber:hover, .btn-cyber:active {
      background: var(--neon-purple);
      color: #FFF;
      box-shadow: 0 0 15px var(--neon-purple);
      transform: scale(0.98);
    }

    /* --- CUPONES --- */
    .coupon-box {
      background: var(--panel-bg);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 24px;
      position: relative;
    }
    .coupon-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--neon-blue);
      box-shadow: 0 0 10px var(--neon-blue);
    }
    .coupon-input-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .coupon-input-row input {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #FFF;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      outline: none;
    }
    .coupon-input-row input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }
    .btn-apply {
      background: var(--neon-blue);
      border: none;
      color: #000;
      padding: 0 16px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: var(--transition);
    }
    .btn-apply:active {
      transform: scale(0.95);
    }

    /* --- CATÁLOGO DE PRODUCTOS --- */
    .section-title {
      font-size: 20px;
      color: var(--text-main);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '>';
      color: var(--neon-blue);
      font-weight: bold;
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      transition: var(--transition);
      position: relative;
    }

    .product-card:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5), 0 0 15px var(--neon-purple-glow);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .product-title {
      font-size: 22px;
      font-weight: 700;
      color: #FFF;
    }

    .product-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .discount-badge {
      display: inline-block;
      font-size: 12px;
      color: var(--neon-blue);
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
    }

    .qty-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 36px;
      height: 36px;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid var(--neon-purple);
      color: var(--neon-purple);
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .qty-btn:active {
      background: var(--neon-purple);
      color: #FFF;
      transform: scale(0.9);
    }

    .qty-input {
      width: 40px;
      text-align: center;
      background: transparent;
      border: none;
      color: #FFF;
      font-size: 20px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      outline: none;
    }

    .total-price {
      font-size: 26px;
      font-weight: 700;
      color: #FFF;
      text-align: right;
      margin-bottom: 16px;
    }

    /* --- MODALES --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 3, 10, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--panel-bg);
      border: 1px solid var(--neon-purple);
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 0 30px var(--neon-purple-glow);
      transform: translateY(20px);
      transition: var(--transition);
    }

    .modal-overlay.active .modal-box {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 24px;
      color: var(--neon-blue);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .cyber-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #FFF;
      padding: 16px;
      border-radius: 6px;
      font-size: 20px;
      font-family: 'Rajdhani', sans-serif;
      margin-bottom: 8px;
      outline: none;
      transition: var(--transition);
    }

    .cyber-input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 16px;
    }

    .summary-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .summary-row strong {
      color: #FFF;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
    }

    .summary-row.total {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255,255,255,0.2);
      font-size: 18px;
    }

    .summary-row.total strong {
      color: var(--neon-blue);
      font-size: 22px;
      text-shadow: 0 0 10px rgba(0,240,255,0.3);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text-main);
      padding: 14px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-confirm {
      flex: 1;
      background: var(--neon-purple);
      border: 1px solid var(--neon-purple);
      color: #FFF;
      padding: 14px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 15px var(--neon-purple-glow);
    }

    .btn-confirm:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

    <!-- HEADER CON LOGO -->
  <div class="header-logo">
    <img src="https://i.imgur.com/yTfGZkQ.jpeg" 
         alt="AZZ eSIM Logo" 
         onerror="this.onerror=null; this.src='https://via.placeholder.com/120?text=AZZ';">
  </div>

  <!-- PANEL PRINCIPAL DE SALDO -->
  <div class="wallet-panel">
    <div class="wallet-label">// SYS_BALANCE_STATUS</div>
    <div class="balance-val cyber-number" id="balance">0,00 €</div>
    <button class="btn-cyber" onclick="openAddBalanceModal()">[ INJECT_FUNDS ]</button>
  </div>

  <!-- CAJA DE CUPONES -->
  <div class="coupon-box">
    <div class="wallet-label" style="color: var(--neon-blue);">// COUPON_SYSTEM</div>
    <div class="coupon-input-row">
      <input type="text" id="couponCode" placeholder="CÓDIGO">
      <button class="btn-apply" onclick="applyCoupon()">APPLY</button>
    </div>
  </div>

  <!-- CATÁLOGO -->
  <div class="section-title">CATALOG_NODE_ACCESS</div>
  <div class="cards-grid" id="productsGrid"></div>

  <!-- MODAL RECARGA -->
  <div id="addBalanceModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">INJECT_FUNDS</div>
      <div class="modal-desc">Transferencia segura a la red principal (Mín: 10€ - Máx: 200€)</div>

      <input class="cyber-input" id="balanceAmount" type="number" min="10" max="200" step="1" placeholder="Cantidad (€)">
      <div id="balanceError" class="error-msg"></div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddBalanceModal()">Abort</button>
        <button class="btn-confirm" onclick="confirmAddBalance()">Execute</button>
      </div>
    </div>
  </div>

  <!-- MODAL COMPRA -->
  <div id="confirmPurchaseModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">CONFIRM_TX</div>
      <div class="modal-desc">Verificando hash de transacción...</div>

      <div class="summary-box" id="purchaseSummary"></div>

      <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">
        SALDO RESTANTE: <span class="cyber-number" id="confirmBalanceAfter" style="color:#FFF;">-</span>
      </p>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeConfirmPurchaseModal()">Abort</button>
        <button class="btn-confirm" onclick="confirmPurchase()">Deploy eSIM</button>
      </div>
    </div>
  </div>

  <!-- LÓGICA JAVASCRIPT -->
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#05030A');

    // 1. LEER DATOS
    const urlParams = new URLSearchParams(window.location.search);
    let userBalance = parseFloat(urlParams.get('balance')) || 0;

    let products = [];
    const productsRaw = urlParams.get('products');
    if (productsRaw) {
      try {
        const decoded = decodeURIComponent(productsRaw);
        const botProducts = JSON.parse(atob(decoded));

        products = botProducts.map(p => {
          let hasBulkDiscount = false;
          let tiers = [];

          if (p.id === "vodafone" || p.id === "lebara") {
            hasBulkDiscount = true;
            tiers = [
              { min: 20, unitPrice: 10 },
              { min: 10, unitPrice: 11 },
              { min: 5, unitPrice: 12 },
              { min: 2, unitPrice: 12.5 }
            ];
          }

          return {
            id: p.id,
            name: p.name,
            description: p.description || "Conexión de red segura",
            basePrice: parseFloat(p.unit_price) || 0,
            hasBulkDiscount,
            tiers
          };
        });
      } catch (e) { console.error("Error parseando:", e); }
    }

    if (products.length === 0) {
      products = [
        { id: "vodafone", name: "Vodafone", description: "90GB · Llamadas ilimitadas", basePrice: 12.99, hasBulkDiscount: true, tiers: [{ min: 20, unitPrice: 10 }, { min: 2, unitPrice: 12.5 }] }
      ];
    }

    let pendingPurchase = null;

    function formatPrice(value) {
      return value.toFixed(2).replace(".", ",") + " €";
    }

    function updateBalanceUI() {
      document.getElementById("balance").textContent = formatPrice(userBalance);
    }

    function getUnitPrice(product, quantity) {
      if (!product.hasBulkDiscount) return product.basePrice;
      for (const tier of product.tiers) {
        if (quantity >= tier.min) return tier.unitPrice;
      }
      return product.basePrice;
    }

    function getTotalPrice(product, quantity) {
      return getUnitPrice(product, quantity) * quantity;
    }

    function renderProducts() {
      const container = document.getElementById("productsGrid");
      container.innerHTML = products.map(p => {
        let discountBadge = p.hasBulkDiscount 
          ? `<div class="discount-badge">>> AUTO_DISCOUNT ENABLED</div>` 
          : "";

        return `
          <div class="product-card">
            <div class="card-header">
              <h3 class="product-title">${p.name}</h3>
            </div>
            <p class="product-desc">${p.description}</p>
            ${discountBadge}

            <div class="qty-row">
              <span style="font-size: 14px; color: var(--text-muted);">UNITS_REQ:</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('${p.id}', -1)">-</button>
                <input class="qty-input" id="qty-${p.id}" type="number" value="1" readonly />
                <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
              </div>
            </div>

            <div class="total-price cyber-number" id="total-${p.id}">${formatPrice(p.basePrice)}</div>
            <button class="btn-cyber" onclick="buyProduct('${p.id}')">INITIALIZE</button>
          </div>
        `;
      }).join("");
    }

    function changeQty(productId, delta) {
      tg.HapticFeedback.impactOccurred('light');
      const input = document.getElementById(`qty-${productId}`);
      let current = parseInt(input.value, 10) || 1;
      let newVal = Math.max(1, current + delta);
      input.value = newVal;
      updateProductSummary(productId);
    }

    function updateProductSummary(productId) {
      const product = products.find(p => p.id === productId);
      const quantity = parseInt(document.getElementById(`qty-${productId}`).value, 10);
      const total = getTotalPrice(product, quantity);
      const unit = getUnitPrice(product, quantity);

      let text = formatPrice(total);
      if (unit < product.basePrice) {
        text += ` <span style="font-size: 14px; color: var(--neon-blue); font-weight: normal;">(${formatPrice(unit)}/ud)</span>`;
      }
      document.getElementById(`total-${productId}`).innerHTML = text;
    }

    function buyProduct(productId) {
      tg.HapticFeedback.impactOccurred('medium');
      const product = products.find(p => p.id === productId);
      const quantity = parseInt(document.getElementById(`qty-${productId}`).value, 10);
      const totalPrice = getTotalPrice(product, quantity);

      if (userBalance < totalPrice) {
        const missing = totalPrice - userBalance;
        tg.showAlert(`Fallo de sistema: Saldo insuficiente. Faltan ${formatPrice(missing)}`);
        openAddBalanceModal(Math.ceil(missing));
        return;
      }

      pendingPurchase = {
        productId: product.id,
        productName: product.name,
        quantity,
        unitPrice: getUnitPrice(product, quantity),
        originalTotal: product.basePrice * quantity,
        discountAmount: (product.basePrice * quantity) - totalPrice,
        totalPrice
      };

      openConfirmPurchaseModal();
    }

    function openConfirmPurchaseModal() {
      if (!pendingPurchase) return;
      const balanceAfter = userBalance - pendingPurchase.totalPrice;

      let discountHtml = pendingPurchase.discountAmount > 0 
        ? `<div class="summary-row" style="color: var(--neon-blue);"><span>SYS_SAVINGS:</span><strong>+${formatPrice(pendingPurchase.discountAmount)}</strong></div>`
        : "";

      document.getElementById("purchaseSummary").innerHTML = `
        <div class="summary-row"><span>NODE:</span><strong>${pendingPurchase.productName}</strong></div>
        <div class="summary-row"><span>UNITS:</span><strong class="cyber-number">${pendingPurchase.quantity}</strong></div>
        <div class="summary-row"><span>UNIT_COST:</span><strong class="cyber-number">${formatPrice(pendingPurchase.unitPrice)}</strong></div>
        ${discountHtml}
        <div class="summary-row total"><span>TOTAL_COST:</span><strong class="cyber-number">${formatPrice(pendingPurchase.totalPrice)}</strong></div>
      `;

      document.getElementById("confirmBalanceAfter").textContent = formatPrice(balanceAfter);
      document.getElementById("confirmPurchaseModal").classList.add("active");
    }

    function closeConfirmPurchaseModal() {
      document.getElementById("confirmPurchaseModal").classList.remove("active");
    }

    function confirmPurchase() {
      tg.HapticFeedback.notificationOccurred('success');
      if (!pendingPurchase) return;
      tg.sendData(JSON.stringify({ type: "purchase", ...pendingPurchase }));
    }

    function openAddBalanceModal(suggested = "") {
      tg.HapticFeedback.impactOccurred('medium');
      document.getElementById("balanceError").textContent = "";
      const input = document.getElementById("balanceAmount");
      input.value = suggested !== "" ? Math.min(200, Math.max(10, suggested)) : "";
      document.getElementById("addBalanceModal").classList.add("active");
    }

    function closeAddBalanceModal() {
      document.getElementById("addBalanceModal").classList.remove("active");
    }

    function confirmAddBalance() {
      const amount = Number(document.getElementById("balanceAmount").value);
      const error = document.getElementById("balanceError");
      error.textContent = "";

      if (!amount || amount < 10 || amount > 200) {
        error.textContent = "ERR: Input_Range [10 - 200]";
        tg.HapticFeedback.notificationOccurred('error');
        return;
      }

      tg.HapticFeedback.notificationOccurred('success');
      tg.sendData(JSON.stringify({ type: "add_balance", amount }));
    }

    // NUEVO: FUNCION APLICAR CUPON
    function applyCoupon() {
      tg.HapticFeedback.impactOccurred('light');
      const input = document.getElementById("couponCode");
      const code = (input.value || "").trim().toUpperCase();

      if (!code) {
        tg.showAlert("ERR: Código vacío");
        return;
      }

      tg.sendData(JSON.stringify({ type: "apply_coupon", code: code }));
    }

    updateBalanceUI();
    renderProducts();
  </script>
</body>
</html>
