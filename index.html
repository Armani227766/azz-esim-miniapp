    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eSIM Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0c10;
            --bg-card: #15161c;
            --accent: #c7cbd6;
            --accent-glow: rgba(173, 124, 255, 0.18);
            --text-main: #ffffff;
            --text-muted: #8b8e98;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(21, 22, 28, 0.7);
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* --- VIRTUAL CARD WALLET --- */
        .wallet-container {
            padding: 20px;
            position: relative;
        }

        .virtual-card {
            background: linear-gradient(135deg, #1e222d 0%, #0d0f14 100%);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-subtle);
        }

        .virtual-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        .card-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .card-logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-logo i {
            color: #b89aff;
        }

        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .balance-currency {
            font-size: 20px;
            color: var(--text-muted);
        }

        /* --- QUICK ACTIONS --- */
        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
            margin-bottom: 35px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
        }

        .action-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #b89aff;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.2s;
        }

        .action-btn:active .action-icon {
            transform: scale(0.92);
            background: #1c1d24;
        }

        .action-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        
        /* --- PROVIDER SECTIONS (Vertical) --- */
        .provider-section {
            margin-bottom: 25px;
        }

        .provider-header {
            padding: 0 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .provider-title {
            font-size: 18px;
            font-weight: 700;
        }

        .provider-header i {
            color: #b89aff;
            font-size: 18px;
        }

        /* Products container row per provider */
        .products-row {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 20px;
            gap: 15px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .products-row::-webkit-scrollbar {
            display: none;
        }

        /* Small modifications to existing product-card */
        .product-card {
            flex: 0 0 200px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.2s, border 0.2s;
        }

        .product-card:active {
            transform: scale(0.96);
        }

        /* --- ESIM CAROUSEL --- */
        .section-header {
            padding: 0 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
        }

        .products-carousel {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 20px;
            gap: 15px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }

        .products-carousel::-webkit-scrollbar {
            display: none; /* Safari/Chrome */
        }

        .product-card {
            flex: 0 0 240px; /* Fixed width for carousel items */
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            scroll-snap-align: start;
            border: 1px solid var(--border-subtle);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(173,124,255,0.12);
            color: #b89aff;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .provider-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #1c1d24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 15px;
            color: white;
        }

        .product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .product-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.4;
            flex-grow: 1;
        }

        .price-tag {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-buy {
            background: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn-buy:active {
            transform: scale(0.96);
        }

        /* --- BOTTOM SHEET MODALS (iOS Style) --- */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: var(--bg-card);
            border-radius: 30px 30px 0 0;
            padding: 24px;
            z-index: 1001;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            border-top: 1px solid var(--border-subtle);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.5);
        }

        .bottom-sheet.active {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        .sheet-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .sheet-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .input-styled {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-styled:focus {
            border-color: #b89aff;
        }

        .btn-primary {
            background: linear-gradient(180deg, rgba(42,42,50,0.96) 0%, rgba(25,25,31,0.98) 100%);
            color: #eceef3;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* --- PURCHASE REVIEW SHEET --- */
        .receipt-box {
            background: var(--bg-base);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .receipt-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed var(--border-subtle);
            font-size: 18px;
            font-weight: 700;
        }

        .stepper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-base);
            border-radius: 14px;
            padding: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-subtle);
        }

        .step-btn {
            background: var(--bg-card);
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        .step-val {
            font-size: 18px;
            font-weight: 600;
        }

        .auth-fingerprint {
            text-align: center;
            margin: 20px 0;
            color: #b89aff;
            font-size: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 14px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

    
        /* --- SPLASH SCREEN (iOS STYLE) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Desenfoque tipo cristal (Frosted Glass) */
            background: rgba(11, 12, 16, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), visibility 0.6s;
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.05); /* Efecto zoom out sutil al desaparecer */
        }

        .splash-logo-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor preparado para tu imagen/logo */
        .splash-logo-img {
            width: 120px;
            height: 120px;
            border-radius: 24px; /* Estilo icono iOS */
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: transparent; /* Fondo transparente para logos PNG */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            /* Spinner estilo iOS (más fino y minimalista) */
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    
        .metal-text {
            background: linear-gradient(180deg, #f4f5f8 0%, #d9dce4 26%, #b9bec8 52%, #f0f2f6 76%, #d7dbe3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-shadow:
                0 1px 0 rgba(255,255,255,0.10),
                0 0 6px rgba(173,124,255,0.18),
                0 0 14px rgba(173,124,255,0.10);
        }
        .metal-soft {
            color: #d5d8e0;
            text-shadow: 0 0 8px rgba(173,124,255,0.12);
        }
        .violet-ui {
            color: #d9dbe3;
            box-shadow: 0 0 0 1px rgba(173,124,255,0.18), 0 10px 24px rgba(0,0,0,0.26), 0 0 18px rgba(173,124,255,0.08);
        }
        .violet-btn {
            background: linear-gradient(180deg, rgba(42,42,50,0.96) 0%, rgba(25,25,31,0.98) 100%);
            color: #eceef3;
            border: 1px solid rgba(173,124,255,0.26);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 16px rgba(173,124,255,0.08);
        }
        .violet-btn:active {
            transform: scale(0.97);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 20px rgba(173,124,255,0.14);
        }
        .provider-icon i, .action-icon i, .card-logo i, .toast i {
            color: #b89aff !important;
            text-shadow: 0 0 10px rgba(173,124,255,0.18);
        }
    
    </style>
</head>
<body>

    <!-- SPLASH SCREEN (iOS STYLE) -->
    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="1000007639.png" alt="eSim Market Logo" class="splash-logo-img" id="customLogo" style="width:180px;height:180px;border-radius:24px;object-fit:contain;box-shadow:none;background:transparent;filter:drop-shadow(0 0 20px rgba(173,124,255,0.18));">
        </div>
        <div class="spinner"></div>
    </div>


    <!-- VIRTUAL WALLET CARD -->
    <div class="wallet-container">
        <div class="virtual-card violet-ui">
            <div class="card-header-top">
                <div class="card-logo metal-text" style="display:flex;align-items:center;gap:10px;">
                    <img src="1000007639.png" alt="Logo" style="width:28px;height:28px;object-fit:contain;background:transparent;filter:drop-shadow(0 0 10px rgba(173,124,255,0.15));">
                    <span>eSim Market</span>
                </div>
                <i class="fa-brands fa-nfc-symbol" style="font-size: 20px; opacity: 0.5;"></i>
            </div>

            <div class="balance-label metal-soft">Fondos Disponibles</div>
            <div class="balance-amount metal-text" id="balance-display">
                0,00 <span class="balance-currency">€</span>
            </div>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="quick-actions">
        <button class="action-btn" onclick="openSheet('rechargeSheet')">
            <div class="action-icon violet-ui"><i class="fa-solid fa-plus"></i></div>
            <span class="action-label metal-soft">Recargar</span>
        </button>
        <button class="action-btn" onclick="openSheet('couponSheet')">
            <div class="action-icon violet-ui"><i class="fa-solid fa-ticket"></i></div>
            <span class="action-label metal-soft">Cupones</span>
        </button>
        <button class="action-btn" onclick="tg.close()">
            <div class="action-icon violet-ui"><i class="fa-solid fa-xmark"></i></div>
            <span class="action-label metal-soft">Cerrar</span>
        </button>
    </div>

    <!-- PROVIDERS CONTAINER -->
    <div id="providersContainer">
        <!-- Providers and horizontal rows injected by JS -->
    </div>

    <!-- OVERLAY -->
    <div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>

    <!-- RECHARGE SHEET -->
    <div class="bottom-sheet violet-ui" id="rechargeSheet">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title metal-text">Añadir Fondos</h2>
        <p class="sheet-subtitle metal-soft">Introduce la cantidad que deseas depositar</p>

        <input type="number" id="recharge-amount" class="input-styled" placeholder="5.00" min="5" step="0.01">
        <button class="btn-primary violet-btn" onclick="tg.HapticFeedback.impactOccurred('medium'); confirmRecharge()">Continuar al Pago</button>
    </div>

    <!-- COUPON SHEET -->
    <div class="bottom-sheet violet-ui" id="couponSheet">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title metal-text">Canjear Cupón</h2>
        <p class="sheet-subtitle metal-soft">Introduce el código promocional</p>

        <input type="text" id="coupon-code" class="input-styled" placeholder="CÓDIGO">
        <button class="btn-primary violet-btn" onclick="tg.HapticFeedback.impactOccurred('medium'); applyCoupon()">Validar Código</button>
    </div>

    <!-- PURCHASE SHEET -->
    <div class="bottom-sheet violet-ui" id="purchaseSheet">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title metal-text">Confirmar Compra</h2>

        <div class="stepper">
            <button class="step-btn violet-btn" onclick="updatePurchaseQty(-1)">-</button>
            <div class="step-val"><span id="review-qty">1</span> uds.</div>
            <button class="step-btn violet-btn" onclick="updatePurchaseQty(1)">+</button>
        </div>

        <div class="receipt-box">
            <div class="receipt-row">
                <span style="color: var(--text-muted)">Producto</span>
                <span id="review-name" style="font-weight:500;">Vodafone 90GB</span>
            </div>
            <div class="receipt-row">
                <span style="color: var(--text-muted)">Precio Ud.</span>
                <span id="review-unit-price">12.99 €</span>
            </div>
            <div class="receipt-row">
                <span>Total a pagar</span>
                <span id="review-total" style="color: var(--accent)">12.99 €</span>
            </div>
        </div>

        <button class="btn-primary violet-btn" onclick="tg.HapticFeedback.impactOccurred('medium'); executePurchase()" id="btn-execute">Confirmar Pago</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toastMsg">
        <i class="fa-solid fa-circle-info" style="color: var(--accent)"></i>
        <span id="toastText">Mensaje</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0b0c10'); // Darkest bg color
        tg.setBackgroundColor('#0b0c10');

        // --- STATE ---
        let userBalance = 0;
        let products = [];
        let currentPurchase = { id: null, qty: 1, basePrice: 0, hasBulk: false, tiers: [], name: '' };

        // --- INIT ---
        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            userBalance = parseFloat(urlParams.get('balance')) || 0;
            updateBalanceUI();

            const productsRaw = urlParams.get('products');
            if (productsRaw) {
                try {
                    const decoded = decodeURIComponent(productsRaw);
                    const botProducts = JSON.parse(atob(decoded));

                    products = botProducts.map(p => ({
                        id: p.id,
                        name: p.name,
                        description: p.description || "Conexión premium",
                        basePrice: parseFloat(p.unit_price) || 0,
                        hasBulkDiscount: (p.id === "vodafone" || p.id === "lebara"),
                        tiers: (p.id === "vodafone" || p.id === "lebara") ? [
                            { min: 20, price: 10 }, { min: 10, price: 11 },
                            { min: 5, price: 12 }, { min: 2, price: 12.5 }
                        ] : []
                    }));
                } catch (e) { console.error("Error parse:", e); }
            }

            if(products.length === 0) {
                // Fallback for testing
                products = [
                    { id: "vodafone", name: "Vodafone", description: "90GB Llamadas", basePrice: 12.99, hasBulkDiscount: true, tiers: [{min: 2, price: 12.5}] },
                    { id: "lebara", name: "Lebara", description: "90GB Data Only", basePrice: 12.99, hasBulkDiscount: false, tiers: [] }
                ];
            }

            
            renderCarousel();

            // Remove splash screen after 800ms to give a smooth loading effect
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
            }, 800);
        }


        // --- UI UPDATES ---
        function formatPrice(val) {
            return val.toFixed(2).replace(".", ",");
        }

        function updateBalanceUI() {
            document.getElementById("balance-display").innerHTML = `${formatPrice(userBalance)} <span class="balance-currency">€</span>`;
        }

        function showToast(msg) {
            const t = document.getElementById("toastMsg");
            document.getElementById("toastText").innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        // --- SHEETS LOGIC ---
        function openSheet(id) {
            document.getElementById("overlay").classList.add("active");
            document.getElementById(id).classList.add("active");
        }

        function closeAllSheets() {
            document.getElementById("overlay").classList.remove("active");
            document.querySelectorAll(".bottom-sheet").forEach(s => s.classList.remove("active"));
        }

        // --- PROVIDERS RENDER ---
        function getProviderName(productName) {
            const name = productName.toLowerCase();
            if (name.includes('vodafone')) return "Vodafone";
            if (name.includes('lebara')) return "Lebara";
            if (name.includes('movistar')) return "Movistar";
            if (name.includes('orange')) return "Orange";
            return "Otras Tarifas";
        }

        function getProviderIcon(provider) {
            if (provider === "Vodafone") return "fa-bolt";
            if (provider === "Lebara") return "fa-globe";
            if (provider === "Movistar") return "fa-m";
            return "fa-signal";
        }

        function renderCarousel() {
            // Reusing the same init function call, but we render grouped by provider
            const grouped = products.reduce((acc, p) => {
                const provider = getProviderName(p.name);
                if (!acc[provider]) acc[provider] = [];
                acc[provider].push(p);
                return acc;
            }, {});

            const container = document.getElementById("providersContainer");
            let html = "";

            for (const [provider, items] of Object.entries(grouped)) {
                html += `
                <div class="provider-section">
                    <div class="provider-header">
                        <i class="fa-solid ${getProviderIcon(provider)}"></i>
                        <span class="provider-title metal-text">${provider}</span>
                    </div>
                    <div class="products-row">
                        ${items.map(p => {
                            const badge = p.hasBulkDiscount ? `<div class="product-badge">OFERTA</div>` : '';
                            return `
                            <div class="product-card violet-ui" onclick="tg.HapticFeedback.impactOccurred('light'); initPurchase('${p.id}')">
                                ${badge}
                                <div class="product-name metal-text" style="font-size:18px;">${p.name}</div>
                                <div class="product-desc metal-soft" style="font-size:12px;">${p.description}</div>
                                <div class="price-tag metal-text" style="font-size:18px;">${formatPrice(p.basePrice)} €</div>
                                <button class="btn-buy violet-btn" style="margin-top:10px; padding:10px; font-size:14px;" onclick="event.stopPropagation(); tg.HapticFeedback.impactOccurred('light'); initPurchase('${p.id}')">Comprar</button>
                            </div>
                            `;
                        }).join("")}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        // --- PURCHASE LOGIC ---
        function getUnitPrice(prod, qty) {
            if(!prod.hasBulkDiscount) return prod.basePrice;
            for(let t of prod.tiers) {
                if(qty >= t.min) return t.price;
            }
            return prod.basePrice;
        }

        function initPurchase(id) {
            const p = products.find(x => x.id === id);
            currentPurchase = { ...p, qty: 1 };
            updatePurchaseUI();
            openSheet('purchaseSheet');
        }

        function updatePurchaseQty(delta) {
            tg.HapticFeedback.impactOccurred('light');
            let newQty = currentPurchase.qty + delta;
            if(newQty < 1) newQty = 1;
            if(newQty > 50) newQty = 50;
            currentPurchase.qty = newQty;
            updatePurchaseUI();
        }

        function updatePurchaseUI() {
            const unitP = getUnitPrice(currentPurchase, currentPurchase.qty);
            const totalP = unitP * currentPurchase.qty;

            document.getElementById('review-qty').innerText = currentPurchase.qty;
            document.getElementById('review-name').innerText = currentPurchase.name;
            document.getElementById('review-unit-price').innerText = formatPrice(unitP) + " €";
            document.getElementById('review-total').innerText = formatPrice(totalP) + " €";

            const btn = document.getElementById('btn-execute');
            if(userBalance < totalP) {
                btn.style.background = "var(--bg-card)";
                btn.style.color = "var(--danger)";
                btn.style.border = "1px solid var(--danger)";
                btn.innerText = "Saldo Insuficiente";
                btn.onclick = () => showToast("Recarga saldo primero");
            } else {
                btn.style.background = "var(--accent)";
                btn.style.color = "white";
                btn.style.border = "none";
                btn.innerText = "Confirmar Pago";
                btn.onclick = executePurchase;
            }
        }

        function executePurchase() {
            const unitP = getUnitPrice(currentPurchase, currentPurchase.qty);
            const totalP = unitP * currentPurchase.qty;
            const originalTotal = currentPurchase.basePrice * currentPurchase.qty;

            if(userBalance < totalP) {
                showToast("Saldo Insuficiente");
                return;
            }

            const payload = {
                type: "purchase",
                productId: currentPurchase.id,
                productName: currentPurchase.name,
                quantity: currentPurchase.qty,
                unitPrice: unitP,
                totalPrice: totalP,
                originalTotal: originalTotal,
                discountAmount: originalTotal - totalP
            };

            tg.sendData(JSON.stringify(payload));
            tg.close();
        }

        // --- ACTIONS ---
        function confirmRecharge() {
            const val = parseFloat(document.getElementById("recharge-amount").value);
            if(isNaN(val) || val <= 0) {
                showToast("Importe inválido");
                return;
            }
            tg.sendData(JSON.stringify({ type: "add_balance", amount: val }));
            tg.close();
        }

        function applyCoupon() {
            const code = document.getElementById("coupon-code").value.trim();
            if(!code) {
                showToast("Introduce un código");
                return;
            }
            tg.sendData(JSON.stringify({ type: "apply_coupon", code: code }));
            tg.close();
        }

        // Run
        initApp();
    </script>
</body>
</html>
