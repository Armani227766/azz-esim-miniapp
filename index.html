<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eSIM Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Paleta Oscura/Metal Premium */
            --bg-base: #0f0f11;
            --bg-card: #1c1c1e;
            --accent: #8e54e9;
            --accent-glow: rgba(142, 84, 233, 0.2);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --danger: #ff453a;
            --success: #32d74b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            /* Quitar el padding bottom exagerado porque ahora usamos el MainButton de Telegram */
            padding-bottom: 20px; 
            overflow-x: hidden;
            /* Scroll limpio, sin barras visibles en Webkit */
        }
        
        ::-webkit-scrollbar {
            display: none;
        }

        /* --- VIRTUAL CARD WALLET --- */
        .wallet-container {
            padding: 20px;
        }

        .virtual-card {
            background: linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
        }

        .card-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .card-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .balance-currency {
            font-size: 20px;
            color: var(--text-muted);
        }

        /* --- QUICK ACTIONS --- */
        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 12px 0;
            border-radius: 16px;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: #2c2c2e;
        }

        .action-btn i {
            font-size: 20px;
            color: var(--accent);
        }

        .action-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* --- PROVIDER SECTIONS (Vertical) --- */
        .provider-section {
            margin-bottom: 30px;
        }

        .provider-header {
            padding: 0 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .provider-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .provider-icon {
            color: var(--accent);
            font-size: 18px;
        }

        /* Tarifas en horizontal dentro de cada compañía */
        .products-row {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 10px;
            gap: 15px;
            scroll-snap-type: x mandatory;
        }

        .product-card {
            flex: 0 0 160px; /* Tarjetas más compactas */
            background: var(--bg-card);
            border-radius: 18px;
            padding: 16px;
            scroll-snap-align: start;
            border: 2px solid transparent; /* Borde transparente por defecto */
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2), border-color 0.2s, background 0.2s;
            cursor: pointer;
        }

        /* Efecto de selección animado */
        .product-card.selected {
            border-color: var(--accent);
            background: #252528;
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        /* Animación al tocar */
        .product-card:active {
            transform: scale(0.96);
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.3;
            flex-grow: 1;
        }

        .price-tag {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(142, 84, 233, 0.15);
            color: var(--accent);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
        }

        /* --- BOTTOM SHEETS --- */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            z-index: 1001;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .bottom-sheet.active {
            bottom: 0;
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 2px;
            margin: 0 auto 20px;
            opacity: 0.5;
        }

        .sheet-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .sheet-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .input-styled {
            width: 100%;
            background: #0f0f11;
            border: 1px solid var(--border-subtle);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-styled:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            font-size: 14px;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- VIRTUAL WALLET CARD -->
    <div class="wallet-container">
        <div class="virtual-card">
            <div class="card-header-top">
                <div class="card-logo">
                    <i class="fa-solid fa-microchip" style="color: var(--accent);"></i>
                    <span>eSim Market</span>
                </div>
            </div>
            <div class="balance-label">Fondos Disponibles</div>
            <div class="balance-amount" id="balance-display">
                0,00 <span class="balance-currency">€</span>
            </div>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="quick-actions">
        <button class="action-btn" onclick="openSheet('rechargeSheet')">
            <i class="fa-solid fa-plus"></i>
            <span class="action-label">Recargar</span>
        </button>
        <button class="action-btn" onclick="openSheet('couponSheet')">
            <i class="fa-solid fa-ticket"></i>
            <span class="action-label">Cupones</span>
        </button>
        <button class="action-btn" onclick="tg.close()">
            <i class="fa-solid fa-xmark"></i>
            <span class="action-label">Cerrar</span>
        </button>
    </div>

    <!-- CONTENEDOR DE COMPAÑÍAS -->
    <div id="providersContainer">
        <!-- JS inyectará las secciones aquí -->
    </div>

    <!-- OVERLAY -->
    <div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>

    <!-- RECHARGE SHEET -->
    <div class="bottom-sheet" id="rechargeSheet">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">Añadir Fondos</h2>
        <p class="sheet-subtitle">Introduce la cantidad que deseas depositar</p>
        <input type="number" id="recharge-amount" class="input-styled" placeholder="0.00" min="10" step="1">
        <button class="btn-primary" onclick="confirmRecharge()">Continuar al Pago</button>
    </div>

    <!-- COUPON SHEET -->
    <div class="bottom-sheet" id="couponSheet">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">Canjear Cupón</h2>
        <p class="sheet-subtitle">Introduce el código promocional</p>
        <input type="text" id="coupon-code" class="input-styled" placeholder="CÓDIGO">
        <button class="btn-primary" onclick="applyCoupon()">Validar Código</button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toastMsg">
        <i class="fa-solid fa-circle-info" style="color: var(--accent)"></i>
        <span id="toastText">Mensaje</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0f0f11');
        tg.setBackgroundColor('#0f0f11');

        // Configuración del botón principal nativo
        tg.MainButton.text = "COMPRAR TARIFA";
        tg.MainButton.color = "#8e54e9";
        tg.MainButton.textColor = "#ffffff";

        let userBalance = 0;
        let products = [];
        let selectedProduct = null;

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            userBalance = parseFloat(urlParams.get('balance')) || 0;
            updateBalanceUI();

            const productsRaw = urlParams.get('products');
            if (productsRaw) {
                try {
                    const decoded = decodeURIComponent(productsRaw);
                    const botProducts = JSON.parse(atob(decoded));
                    products = botProducts.map(p => ({
                        id: p.id,
                        name: p.name,
                        description: p.description || "Conexión premium",
                        basePrice: parseFloat(p.unit_price) || 0,
                        hasBulkDiscount: (p.id.toLowerCase().includes('vodafone') || p.id.toLowerCase().includes('lebara')),
                        provider: getProviderName(p.name)
                    }));
                } catch (e) { console.error("Error parse:", e); }
            }

            if(products.length === 0) {
                // Datos de prueba si se abre fuera del bot
                products = [
                    { id: "vodafone1", name: "Vodafone 50GB", description: "Llamadas ilimitadas", basePrice: 10.00, hasBulkDiscount: true, provider: "Vodafone" },
                    { id: "vodafone2", name: "Vodafone 90GB", description: "Llamadas ilimitadas", basePrice: 12.99, hasBulkDiscount: true, provider: "Vodafone" },
                    { id: "lebara1", name: "Lebara 40GB", description: "Datos móviles", basePrice: 9.99, hasBulkDiscount: false, provider: "Lebara" },
                    { id: "movistar1", name: "Movistar Viaje", description: "Uso internacional", basePrice: 15.00, hasBulkDiscount: false, provider: "Otros" }
                ];
            }
            
            renderProviders();
        }

        // Función para clasificar por compañía basada en el nombre
        function getProviderName(productName) {
            const name = productName.toLowerCase();
            if (name.includes('vodafone')) return "Vodafone";
            if (name.includes('lebara')) return "Lebara";
            if (name.includes('movistar')) return "Movistar";
            if (name.includes('orange')) return "Orange";
            return "Otras Tarifas";
        }

        // Función para obtener el icono según la compañía
        function getProviderIcon(provider) {
            if (provider === "Vodafone") return "fa-bolt";
            if (provider === "Lebara") return "fa-globe";
            if (provider === "Movistar") return "fa-m";
            return "fa-signal";
        }

        function renderProviders() {
            // Agrupar productos por compañía
            const grouped = products.reduce((acc, p) => {
                if (!acc[p.provider]) acc[p.provider] = [];
                acc[p.provider].push(p);
                return acc;
            }, {});

            const container = document.getElementById("providersContainer");
            let html = "";

            for (const [provider, items] of Object.entries(grouped)) {
                html += `
                <div class="provider-section">
                    <div class="provider-header">
                        <i class="fa-solid ${getProviderIcon(provider)} provider-icon"></i>
                        <span class="provider-title">${provider}</span>
                    </div>
                    <div class="products-row">
                        ${items.map(p => `
                            <div class="product-card" id="card-${p.id}" onclick="selectProduct('${p.id}')">
                                ${p.hasBulkDiscount ? `<div class="product-badge">OFERTA</div>` : ''}
                                <div class="product-name">${p.name}</div>
                                <div class="product-desc">${p.description}</div>
                                <div class="price-tag">${formatPrice(p.basePrice)} €</div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        function formatPrice(val) {
            return val.toFixed(2).replace(".", ",");
        }

        function updateBalanceUI() {
            document.getElementById("balance-display").innerHTML = `${formatPrice(userBalance)} <span class="balance-currency">€</span>`;
        }

        // Al tocar una tarifa
        function selectProduct(id) {
            // Vibración nativa
            tg.HapticFeedback.impactOccurred('light');

            // Quitar clase selected de todas
            document.querySelectorAll('.product-card').forEach(el => el.classList.remove('selected'));
            
            // Añadir clase a la tocada
            document.getElementById(`card-${id}`).classList.add('selected');
            
            // Guardar selección
            selectedProduct = products.find(p => p.id === id);

            // Mostrar el botón principal de Telegram
            tg.MainButton.text = `COMPRAR ${selectedProduct.name} - ${formatPrice(selectedProduct.basePrice)} €`;
            tg.MainButton.show();
        }

        // Evento al pulsar el botón nativo de Telegram
        tg.onEvent('mainButtonClicked', function() {
            if (!selectedProduct) return;
            tg.HapticFeedback.impactOccurred('medium');

            if (userBalance < selectedProduct.basePrice) {
                showToast("Saldo Insuficiente. Recarga primero.");
                // Opcional: Vibración de error
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            const payload = {
                type: "purchase",
                productId: selectedProduct.id,
                productName: selectedProduct.name,
                quantity: 1,
                unitPrice: selectedProduct.basePrice,
                totalPrice: selectedProduct.basePrice,
                originalTotal: selectedProduct.basePrice,
                discountAmount: 0
            };

            tg.sendData(JSON.stringify(payload));
            tg.close();
        });

        function showToast(msg) {
            const t = document.getElementById("toastMsg");
            document.getElementById("toastText").innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function openSheet(id) {
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById("overlay").classList.add("active");
            document.getElementById(id).classList.add("active");
            tg.MainButton.hide(); // Ocultamos el botón principal si abrimos un modal
        }

        function closeAllSheets() {
            document.getElementById("overlay").classList.remove("active");
            document.querySelectorAll(".bottom-sheet").forEach(s => s.classList.remove("active"));
            // Si hay algo seleccionado, volvemos a mostrar el botón
            if (selectedProduct) {
                tg.MainButton.show();
            }
        }

        function confirmRecharge() {
            tg.HapticFeedback.impactOccurred('medium');
            const val = parseFloat(document.getElementById("recharge-amount").value);
            if(isNaN(val) || val <= 0) {
                showToast("Importe inválido");
                return;
            }
            tg.sendData(JSON.stringify({ type: "add_balance", amount: val }));
            tg.close();
        }

        function applyCoupon() {
            tg.HapticFeedback.impactOccurred('medium');
            const code = document.getElementById("coupon-code").value.trim();
            if(!code) {
                showToast("Introduce un código");
                return;
            }
            tg.sendData(JSON.stringify({ type: "apply_coupon", code: code }));
            tg.close();
        }

        initApp();
    </script>
</body>
</html>
