  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. LEER EL SALDO ENVIADO POR EL BOT DESDE LA URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlBalance = parseFloat(urlParams.get('balance'));
    let userBalance = isNaN(urlBalance) ? 0 : urlBalance;
    
    let pendingPurchase = null;

    const products = [
      {
        id: "vodafone",
        name: "Vodafone",
        description: "90GB · Llamadas ilimitadas",
        basePrice: 12.99,
        hasBulkDiscount: true,
        tiers: [
          { min: 20, unitPrice: 10 },
          { min: 10, unitPrice: 11 },
          { min: 5, unitPrice: 12 },
          { min: 2, unitPrice: 12.5 }
        ]
      },
      {
        id: "lebara",
        name: "Lebara",
        description: "90GB · Llamadas ilimitadas · QR 1 SOLO USO!!",
        basePrice: 12.99,
        hasBulkDiscount: true,
        tiers: [
          { min: 20, unitPrice: 10 },
          { min: 10, unitPrice: 11 },
          { min: 5, unitPrice: 12 },
          { min: 2, unitPrice: 12.5 }
        ]
      },
      {
        id: "vodafoneplus",
        name: "Vodafone+",
        description: "270GB · 1000 min internacionales",
        basePrice: 16.99,
        hasBulkDiscount: false,
        tiers: []
      }
    ];

    function formatPrice(value) {
      return value.toFixed(2).replace(".", ",") + " €";
    }

    function updateBalanceUI() {
      document.getElementById("balance").textContent = formatPrice(userBalance);
    }

    function getUnitPrice(product, quantity) {
      if (!product.hasBulkDiscount) return product.basePrice;
      for (const tier of product.tiers) {
        if (quantity >= tier.min) {
          return tier.unitPrice;
        }
      }
      return product.basePrice;
    }

    function getTotalPrice(product, quantity) {
      return getUnitPrice(product, quantity) * quantity;
    }

    function renderProducts() {
      const container = document.getElementById("cards");
      container.innerHTML = products.map(product => {
        return `
          <div class="card">
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <div class="base-price">Precio base: ${formatPrice(product.basePrice)}</div>
            <div class="qty-row">
              <label for="qty-${product.id}">Cantidad</label>
              <input
                id="qty-${product.id}"
                type="number"
                min="1"
                step="1"
                value="1"
                oninput="updateProductSummary('${product.id}')"
              />
            </div>
            <div class="summary">
              <div class="summary-total" id="total-${product.id}">
                Total: ${formatPrice(product.basePrice)}
              </div>
            </div>
            <button class="buy-btn" onclick="buyProduct('${product.id}')">Comprar</button>
          </div>
        `;
      }).join("");

      products.forEach(product => updateProductSummary(product.id));
    }

    function updateProductSummary(productId) {
      const product = products.find(p => p.id === productId);
      const input = document.getElementById(`qty-${productId}`);
      let quantity = parseInt(input.value, 10);

      if (isNaN(quantity) || quantity < 1) {
        quantity = 1;
        input.value = 1;
      }

      const totalPrice = getTotalPrice(product, quantity);
      document.getElementById(`total-${productId}`).textContent = `Total: ${formatPrice(totalPrice)}`;
    }

    function buyProduct(productId) {
      const product = products.find(p => p.id === productId);
      const input = document.getElementById(`qty-${productId}`);
      let quantity = parseInt(input.value, 10);

      if (isNaN(quantity) || quantity < 1) {
        quantity = 1;
        input.value = 1;
      }

      const totalPrice = getTotalPrice(product, quantity);

      if (userBalance < totalPrice) {
        const missingRaw = totalPrice - userBalance;
        let suggestedAmount = Math.ceil(missingRaw);
        if (suggestedAmount < 10) suggestedAmount = 10;
        if (suggestedAmount > 200) suggestedAmount = 200;

        tg.showAlert(`No tienes saldo suficiente. Te faltan ${formatPrice(missingRaw)}.`);
        openAddBalanceModal(suggestedAmount);
        return;
      }

      const unitPrice = getUnitPrice(product, quantity);
      const originalTotal = product.basePrice * quantity;
      const discountAmount = originalTotal - totalPrice;

      pendingPurchase = {
        productId: product.id,
        productName: product.name,
        quantity,
        unitPrice,
        originalTotal,
        discountAmount,
        totalPrice
      };

      openConfirmPurchaseModal();
    }

    function openConfirmPurchaseModal() {
      if (!pendingPurchase) return;

      const balanceAfter = userBalance - pendingPurchase.totalPrice;

      document.getElementById("confirmProduct").textContent = `Producto: ${pendingPurchase.productName}`;
      document.getElementById("confirmQuantity").textContent = `Cantidad: ${pendingPurchase.quantity}`;
      document.getElementById("confirmUnitPrice").textContent = `Precio unitario: ${formatPrice(pendingPurchase.unitPrice)}`;
      document.getElementById("confirmOriginalTotal").textContent = `Total sin descuento: ${formatPrice(pendingPurchase.originalTotal)}`;
      document.getElementById("confirmDiscount").textContent = `Descuento aplicado: ${formatPrice(pendingPurchase.discountAmount)}`;
      document.getElementById("confirmBalanceBefore").textContent = `Saldo actual: ${formatPrice(userBalance)}`;
      document.getElementById("confirmTotal").textContent = `Total: ${formatPrice(pendingPurchase.totalPrice)}`;
      document.getElementById("confirmBalanceAfter").textContent = `Saldo después: ${formatPrice(balanceAfter)}`;

      document.getElementById("confirmPurchaseModal").classList.remove("hidden");
    }

    function closeConfirmPurchaseModal() {
      document.getElementById("confirmPurchaseModal").classList.add("hidden");
    }

    function confirmPurchase() {
      if (!pendingPurchase) return;

      const payload = {
        type: "purchase",
        productId: pendingPurchase.productId,
        productName: pendingPurchase.productName,
        quantity: pendingPurchase.quantity,
        unitPrice: pendingPurchase.unitPrice,
        originalTotal: pendingPurchase.originalTotal,
        discountAmount: pendingPurchase.discountAmount,
        totalPrice: pendingPurchase.totalPrice
      };

      // Enviamos el pedido al bot y Telegram cerrará automáticamente la ventana
      tg.sendData(JSON.stringify(payload));
    }

    function openAddBalanceModal(suggestedAmount = "") {
      document.getElementById("addBalanceModal").classList.remove("hidden");
      document.getElementById("balanceError").textContent = "";
      const input = document.getElementById("balanceAmount");

      if (suggestedAmount !== "") {
        let safeAmount = suggestedAmount;
        if (safeAmount < 10) safeAmount = 10;
        if (safeAmount > 200) safeAmount = 200;
        input.value = safeAmount;
      } else {
        input.value = "";
      }
    }

    function closeAddBalanceModal() {
      document.getElementById("addBalanceModal").classList.add("hidden");
    }

    function confirmAddBalance() {
      const input = document.getElementById("balanceAmount");
      const error = document.getElementById("balanceError");
      const amount = Number(input.value);

      error.textContent = "";

      if (!input.value) {
        error.textContent = "Introduce una cantidad.";
        return;
      }
      if (amount < 10) {
        error.textContent = "El mínimo para añadir saldo es 10 €.";
        return;
      }
      if (amount > 200) {
        error.textContent = "El máximo para añadir saldo es 200 €.";
        return;
      }

      const payload = {
        type: "add_balance",
        amount: amount
      };

      // Enviamos la orden de recarga al bot y se cierra la ventana
      tg.sendData(JSON.stringify(payload));
    }

    // Inicializar valores al cargar
    updateBalanceUI();
    renderProducts();
  </script>
