<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>eSIM Store - Tienda Premium</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0066FF;
      --secondary: #00C4B4;
      --success: #34C759;
      --warning: #FF9500;
      --danger: #FF3B30;
      --dark: #1C1C1E;
      --light: #F2F2F7;
      --white: #FFFFFF;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --border: #E5E5EA;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--light) 0%, #E8F0FE 100%);
      color: var(--dark);
      min-height: 100vh;
      padding: 20px 16px 80px;
      overflow-x: hidden;
    }

    /* Header Premium */
    .header {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .balance-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .balance-label {
      font-size: 14px;
      font-weight: 500;
      color: #8E8E93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .balance {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .add-funds-btn {
      background: linear-gradient(135deg, var(--primary), #0052CC);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-funds-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .add-funds-btn:active {
      transform: scale(0.98);
    }

    /* Sección de Productos */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-left: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .products-grid {
      display: grid;
      gap: 20px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
    }

    .product-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .product-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }

    .product-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-desc {
      color: #8E8E93;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .price-badge {
      background: linear-gradient(135deg, var(--success), #00A676);
      color: white;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
    }

    .quantity-selector {
      background: rgba(242, 242, 247, 0.8);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .qty-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 44px;
      height: 44px;
      border: 2px solid var(--primary);
      background: white;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:hover {
      background: var(--primary);
      color: white;
    }

    .qty-display {
      font-size: 24px;
      font-weight: 700;
      min-width: 44px;
      text-align: center;
      color: var(--dark);
    }

    .total-price {
      font-size: 28px;
      font-weight: 800;
      text-align: right;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .buy-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .buy-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .buy-btn:hover::before {
      left: 100%;
    }

    .buy-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 102, 255, 0.4);
    }

    /* Modales Premium */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 28, 30, 0.8);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      transform: scale(0.8) translateY(20px);
      transition: var(--transition);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-subtitle {
      text-align: center;
      color: #8E8E93;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 20px 20px 20px 60px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 18px;
      font-weight: 500;
      background: #F8F9FA;
      transition: var(--transition);
      outline: none;
    }

    .input-field:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #8E8E93;
      font-size: 20px;
    }

    .error-message {
      color: var(--danger);
      font-size: 14px;
      margin-top: 8px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-actions {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }

    .btn-secondary {
      flex: 1;
      background: var(--light);
      color: var(--dark);
      border: 2px solid var(--border);
      padding: 18px;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 18px;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    /* Animaciones de carga */
    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #E5E5EA;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px 80px;
      }
      
      .balance {
        font-size: 32px;
      }
      
      .product-card {
        padding: 20px;
      }
    }

    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--light);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <!-- Header con Saldo -->
  <div class="header">
    <div class="balance-container">
      <div>
        <div class="balance-label">Saldo Disponible</div>
        <div class="balance" id="balance">0,00 €</div>
      </div>
      <button class="add-funds-btn" onclick="openAddBalanceModal()">
        <i class="fas fa-plus"></i>
        Añadir Fondos
      </button>
    </div>
  </div>

  <!-- Título de Sección -->
  <h1 class="section-title">
    <i class="fas fa-mobile-alt"></i> eSIMs Disponibles
  </h1>

  <!-- Grid de Productos -->
  <div class="products-grid" id="productsGrid"></div>

  <!-- Modal Añadir Saldo -->
  <div id="addBalanceModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-title">
        <i class="fas fa-wallet"></i> Recargar Monedero
      </div>
      <div class="modal-subtitle">Mínimo 10€ - Máximo 200€ por transacción</div>
      
      <div class="input-group">
        <i class="fas fa-euro-sign input-icon"></i>
        <input class="input-field" id="balanceAmount" type="number" min="10" max="200" step="1" placeholder="Ej: 25">
        <div id="balanceError" class="error-message">
          <i class="fas fa-exclamation-circle"></i>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeAddBalanceModal()">Cancelar</button>
        <button class="btn-primary" onclick="confirmAddBalance()">
          <i class="fas fa-credit-card"></i> Continuar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Confirmar Compra -->
  <div id="confirmPurchaseModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-title">
        <i class="fas fa-check-circle"></i> Confirmar Pedido
      </div>
      <div class="modal-subtitle">Revisa tu compra antes de confirmar</div>

      <div id="purchaseSummary"></div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeConfirmPurchaseModal()">Cancelar</button>
        <button class="btn-primary" onclick="confirmPurchase()">
          <i class="fas fa-shopping-cart"></i> Comprar Ahora
        </button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#FFFFFF');

    // Leer datos desde URL (bot)
    const urlParams = new URLSearchParams(window.location.search);
    let userBalance = parseFloat(urlParams.get('balance')) || 0;
    let products = [];
    
    // Parsear productos dinámicos del bot
    const productsRaw = urlParams.get('products');
    if (productsRaw) {
      try {
        const decoded = decodeURIComponent(productsRaw);
        const botProducts = JSON.parse(atob(decoded));
        products = botProducts.map(p => ({
          id: p.id,
          name: p.name,
          description: p.description || 'Tarifa Premium eSIM',
          basePrice: parseFloat(p.unit_price) || 0,
          hasBulkDiscount: true,
          tiers: [
            { min: 20, unitPrice: p.unit_price * 0.77 },
            { min: 10, unitPrice: p.unit_price * 0.85 },
            { min: 5, unitPrice: p.unit_price * 0.92 },
            { min: 2, unitPrice: p.unit_price * 0.96 }
          ]
        }));
      } catch(e) {
        console.error('Error parsing products:', e);
      }
    }

    let pendingPurchase = null;

    function formatPrice(value) {
      return value.toLocaleString('es-ES', { 
        minimumFractionDigits: 2, 
        maximumFractionDigits: 2 
      }) + ' €';
    }

    function updateBalanceUI() {
      document.getElementById('balance').textContent = formatPrice(userBalance);
    }

    function getUnitPrice(product, qty) {
      if (!product.hasBulkDiscount || qty < 2) return product.basePrice;
      for (let tier of product.tiers) {
        if (qty >= tier.min) return tier.unitPrice;
      }
      return product.basePrice;
    }

    function getTotalPrice(product, qty) {
      return getUnitPrice(product, qty) * qty;
    }

    function getIconForProduct(name) {
      name = name.toLowerCase();
      if (name.includes('vodafone')) return '📱🔴';
      if (name.includes('lebara')) return '📱🔵';
      if (name.includes('movistar')) return '📱🟢';
      if (name.includes('orange')) return '📱🟠';
      if (name.includes('lyca')) return '🌐';
      return '📶';
    }

    function renderProducts() {
      const container = document.getElementById('productsGrid');
      container.innerHTML = products.map(p => {
        const icon = getIconForProduct(p.name);
        return `
          <div class="product-card" onclick="buyProduct('${p.id}')">
            <div class="product-header">
              <div class="product-icon">${icon}</div>
              <div>
                <div class="product-title">${p.name}</div>
                <div class="product-desc">${p.description}</div>
              </div>
            </div>
            <div class="price-badge">${formatPrice(p.basePrice)}<span style="font-size:14px;opacity:0.8;">/unidad</span></div>
            
            <div class="quantity-selector">
              <div class="qty-label">Cantidad</div>
              <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
                <input class="qty-display" id="qty-${p.id}" type="number" value="1" readonly>
                <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
              </div>
            </div>
            
            <div class="total-price" id="total-${p.id}">${formatPrice(p.basePrice)}</div>
            <button class="buy-btn">
              <i class="fas fa-bolt"></i> Comprar Ahora
            </button>
          </div>
        `;
      }).join('');
      
      products.forEach(p => updateProductSummary(p.id));
    }

    function changeQty(id, delta) {
      tg.HapticFeedback.impactOccurred('light');
      const input = document.getElementById(`qty-${id}`);
      let qty = parseInt(input.value) || 1;
      qty = Math.max(1, qty + delta);
      input.value = qty;
      updateProductSummary(id);
    }

    function updateProductSummary(id) {
      const product = products.find(p => p.id === id);
      const qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
      const total = getTotalPrice(product, qty);
      const unit = getUnitPrice(product, qty);
      
      document.getElementById(`total-${id}`).innerHTML = 
        formatPrice(total) + (unit < product.basePrice ? `<span style="font-size:16px;color:var(--success);font-weight:500;"> (${formatPrice(unit)}/ud)</span>` : '');
    }

    function buyProduct(id) {
      tg.HapticFeedback.impactOccurred('medium');
      const product = products.find(p => p.id === id);
      const qtyInput = document.getElementById(`qty-${id}`);
      const qty = parseInt(qtyInput.value) || 1;
      
      const totalPrice = getTotalPrice(product, qty);
      
      if (userBalance < totalPrice) {
        const missing = totalPrice - userBalance;
        tg.showAlert(`Saldo insuficiente. Faltan ${formatPrice(missing)}`);
        openAddBalanceModal(missing);
        return;
      }

      const unitPrice = getUnitPrice(product, qty);
      const originalTotal = product.basePrice * qty;
      const discount = originalTotal - totalPrice;

      pendingPurchase = {
        productId: id,
        productName: product.name,
        quantity: qty,
        unitPrice,
        originalTotal,
        discountAmount: discount,
        totalPrice
      };

      openConfirmPurchaseModal();
    }

    function openConfirmPurchaseModal() {
      if (!pendingPurchase) return;
      
      const balanceAfter = userBalance - pendingPurchase.totalPrice;
      
      document.getElementById('purchaseSummary').innerHTML = `
        <div class="summary-row">
          <span><i class="fas fa-tag"></i> Producto</span>
          <strong>${pendingPurchase.productName}</strong>
        </div>
        <div class="summary-row">
          <span><i class="fas fa-hashtag"></i> Cantidad</span>
          <strong>${pendingPurchase.quantity}</strong>
        </div>
        <div class="summary-row">
          <span><i class="fas fa-coins"></i> Precio unitario</span>
          <strong>${formatPrice(pendingPurchase.unitPrice)}</strong>
        </div>
        ${pendingPurchase.discountAmount > 0 ? `
        <div class="summary-row" style="color: var(--success);">
          <span><i class="fas fa-percent"></i> Ahorro</span>
          <strong>+${formatPrice(pendingPurchase.discountAmount)}</strong>
        </div>
        ` : ''}
        <div class="summary-row total">
          <span><i class="fas fa-shopping-cart"></i> Total</span>
          <strong>${formatPrice(pendingPurchase.totalPrice)}</strong>
        </div>
        <div style="text-align:center; color:#8E8E93; font-size:14px; margin-top:12px;">
          Saldo restante: <strong>${formatPrice(balanceAfter)}</strong>
        </div>
      `;

      document.getElementById('confirmPurchaseModal').classList.add('active');
    }

    function closeConfirmPurchaseModal() {
      document.getElementById('confirmPurchaseModal').classList.remove('active');
    }

    function confirmPurchase() {
      tg.HapticFeedback.notificationOccurred('success');
      if (!pendingPurchase) return;

      const payload = {
        type: "purchase",
        productId: pendingPurchase.productId,
        productName: pendingPurchase.productName,
        quantity: pendingPurchase.quantity,
        unitPrice: pendingPurchase.unitPrice,
        originalTotal: pendingPurchase.originalTotal,
        discountAmount: pendingPurchase.discountAmount,
        totalPrice: pendingPurchase.totalPrice
      };

      tg.sendData(JSON.stringify(payload));
    }

    function openAddBalanceModal(suggested = 0) {
      tg.HapticFeedback.impactOccurred('medium');
      const modal = document.getElementById('addBalanceModal');
      const input = document.getElementById('balanceAmount');
      
      input.value = suggested > 200 ? 200 : Math.max(10, suggested);
      document.getElementById('balanceError').innerHTML = '';
      modal.classList.add('active');
    }

    function closeAddBalanceModal() {
      document.getElementById('addBalanceModal').classList.remove('active');
    }

    function confirmAddBalance() {
      const amount = parseFloat(document.getElementById('balanceAmount').value);
      const errorEl = document.getElementById('balanceError');

      if (!amount || amount < 10 || amount > 200) {
        errorEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Importe entre 10€ y 200€';
        return;
      }

      tg.HapticFeedback.notificationOccurred('success');
      tg.sendData(JSON.stringify({ type: "add_balance", amount }));
    }

    // Inicializar
    updateBalanceUI();
    renderProducts();
  </script>
</body>
</html>
