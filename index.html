<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eSim's Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.balance-box {
  display: flex;
  flex-direction: column;
  background: #1e293b;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
}

.balance-label {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 4px;
}

.balance-value {
  font-size: 18px;
  font-weight: bold;
  color: #ffffff;
}

.add-balance-btn {
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: bold;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  white-space: nowrap;
}

.add-balance-btn:hover {
  background: #2563eb;
}
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      color: #94a3b8;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }

    .note {
      margin-top: 24px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="topbar">
  <div class="balance-box">
    <span class="balance-label">Saldo</span>
    <span class="balance-value" id="balanceValue">0,00 €</span>
  </div>

  <button class="add-balance-btn" onclick="openAddBalance()">
    + Añadir saldo
  </button>
</div>
  <div class="grid">
  <div class="card">
    <h2>Vodafone</h2>
    <div class="meta">90GB · Llamadas ilimitadas</div>
    <div class="price">12,99 €</div>
    <button class="btn" onclick="selectPlan('Vodafone', '90GB · Llamadas ilimitadas', '12,99 €')">Seleccionar</button>
  </div>

  <div class="card">
    <h2>Lebara</h2>
    <div class="meta">90GB · Llamadas ilimitadas · QR 1 SOLO USO!!</div>
    <div class="price">12,99 €</div>
    <button class="btn" onclick="selectPlan('Lebara', '90GB · Llamadas ilimitadas · QR 1 SOLO USO!!', '12,99 €')">Seleccionar</button>
  </div>

  <div class="card">
    <h2>Vodafone+</h2>
    <div class="meta">270GB · 1000 min internacionales</div>
    <div class="price">16.99 €</div>
    <button class="btn" onclick="selectPlan('Vodafone+', '270GB · 1000 min internacionales', '16.99 €')">Comprar</button>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let selectedPlan = null;
  let currentBalance = "0,00 €";

  const balanceElement = document.getElementById("balanceValue");
  balanceElement.textContent = currentBalance;

  tg.MainButton.hide();

  function openAddBalance() {
    tg.showAlert("Aquí abriremos la pantalla de añadir saldo en el siguiente paso.");
  }

  function selectPlan(name, details, price) {
    selectedPlan = {
      name: name,
      details: details,
      price: price
    };

    tg.MainButton.setText("Comprar " + name);
    tg.MainButton.show();
    tg.MainButton.enable();
  }

  tg.onEvent("mainButtonClicked", function () {
    if (!selectedPlan) {
      tg.showAlert("Primero selecciona una eSIM.");
      return;
    }

    tg.sendData(JSON.stringify(selectedPlan));
    tg.close();
  });
</script>
</body>
</html>
