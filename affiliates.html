<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard VIP - eSimMarket</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tipografía Satoshi (Premium) -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Colores Nexus Modo Oscuro (VIP) */
            --color-bg: #171614;
            --color-surface: #1c1b19;
            --color-surface-2: #22211f;
            --color-border: #393836;
            --color-text: #cdccca;
            --color-text-muted: #797876;
            --color-primary: #e8af34; /* Dorado VIP */
            --color-primary-active: #b07a00;
            --color-success: #6daa45;
            --color-success-bg: rgba(109, 170, 69, 0.1);
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --space-4: 16px;
            --space-6: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Satoshi', sans-serif; }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            padding: var(--space-4);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px; /* Espacio para el botón de Telegram */
        }

        header { margin-bottom: var(--space-6); }
        h1 { font-size: 24px; color: #fff; font-weight: 700; margin-bottom: 4px; }
        p.subtitle { color: var(--color-text-muted); font-size: 14px; }

        /* Tarjeta Principal (Saldo) */
        .balance-card {
            background: linear-gradient(145deg, var(--color-surface) 0%, var(--color-surface-2) 100%);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            margin-bottom: var(--space-4);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .balance-label { font-size: 14px; color: var(--color-text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-amount { font-size: 42px; font-weight: 700; color: var(--color-primary); margin: 8px 0; }

        .btn-withdraw {
            background-color: var(--color-primary);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-withdraw:active { background-color: var(--color-primary-active); transform: scale(0.98); }

        /* Grid de KPIs */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .kpi-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 16px;
        }
        .kpi-value { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .kpi-label { font-size: 13px; color: var(--color-text-muted); }

        /* Lista de Referidos */
        h2 { font-size: 18px; color: #fff; margin-bottom: 12px; }
        .ref-list { display: flex; flex-direction: column; gap: 8px; }
        .ref-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--color-surface);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
        }
        .ref-info strong { display: block; color: #fff; font-size: 15px; margin-bottom: 2px; }
        .ref-info span { font-size: 12px; color: var(--color-text-muted); }
        .badge {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.paid { background-color: var(--color-success-bg); color: var(--color-success); border: 1px solid rgba(109, 170, 69, 0.2); }
        .badge.pending { background-color: rgba(255, 255, 255, 0.05); color: var(--color-text-muted); }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--color-text-muted);
            background-color: var(--color-surface);
            border-radius: var(--radius-md);
            border: 1px dashed var(--color-border);
        }
    </style>
</head>
<body>

    <header>
        <h1>Panel de Socio VIP</h1>
        <p class="subtitle">Resumen de ingresos y referidos</p>
    </header>

    <div class="balance-card">
        <div class="balance-label">Ganancias Disponibles</div>
        <div class="balance-amount" id="val-balance">€ 0.00</div>
        <button class="btn-withdraw" id="btn-withdraw">
            <i data-lucide="wallet"></i> Solicitar Retiro
        </button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-value" id="val-total">0</div>
            <div class="kpi-label">Referidos Totales</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-value" id="val-active">0</div>
            <div class="kpi-label">Recargaron (Activos)</div>
        </div>
    </div>

    <h2>Historial de Referidos</h2>
    <div class="ref-list" id="ref-list">
        <!-- Generado por JS -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Inicializar iconos
        lucide.createIcons();

        // Leer datos de la URL
        function parseData() {
            const params = new URLSearchParams(window.location.search);
            const dataStr = params.get('data');
            
            if (!dataStr) return null;
            
            try {
                // Decodificar Base64 de forma segura con caracteres especiales
                const decodedStr = decodeURIComponent(escape(atob(decodeURIComponent(dataStr))));
                return JSON.parse(decodedStr);
            } catch (error) {
                console.error("Error al leer datos:", error);
                return null;
            }
        }

        const data = parseData();

        if (data) {
            // Llenar KPIs
            document.getElementById('val-balance').innerText = `€ ${data.balance.toFixed(2)}`;
            document.getElementById('val-total').innerText = data.total_referrals;
            document.getElementById('val-active').innerText = data.active_referrals;

            // Renderizar Lista
            const listEl = document.getElementById('ref-list');
            if (data.referrals.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="users" style="margin: 0 auto 12px auto; opacity: 0.5;"></i>
                        <p>Aún no tienes referidos.<br>Comparte tu enlace para empezar a ganar.</p>
                    </div>`;
                lucide.createIcons();
            } else {
                let html = '';
                data.referrals.forEach(ref => {
                    const isPaid = ref.affiliate_paid === 1;
                    const dateObj = new Date(ref.created_at);
                    const dateStr = dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
                    const name = ref.username ? `@${ref.username}` : `Usuario ${ref.user_id}`;
                    
                    html += `
                        <div class="ref-card">
                            <div class="ref-info">
                                <strong>${name}</strong>
                                <span>Registrado: ${dateStr}</span>
                            </div>
                            <div class="badge ${isPaid ? 'paid' : 'pending'}">
                                ${isPaid ? 'Comisión ganada' : 'Pendiente'}
                            </div>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            }
        }

        // Evento Botón de Retiro
        document.getElementById('btn-withdraw').addEventListener('click', () => {
            if (data && data.balance < 5.0) {
                tg.showAlert("Necesitas un mínimo de 5.00€ para solicitar un retiro.");
                return;
            }
            
            // Enviar acción al bot de Python
            tg.sendData(JSON.stringify({
                type: "withdraw_request",
                balance: data ? data.balance : 0
            }));
            tg.close();
        });
    </script>
</body>
</html>
