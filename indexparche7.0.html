<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eSim Market</title>
  <style>
    :root{--bg:#0b1220;--panel:#111827;--line:#243041;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#22c55e}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}
    .muted{color:var(--muted)}
    .tabs{display:flex;gap:10px;margin:16px 0}
    .tab{padding:10px 14px;border:0;border-radius:12px;background:#243041;color:#fff;cursor:pointer;font-weight:700}
    .tab.active{background:var(--blue)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{background:#0f172a;border:1px solid var(--line);border-radius:16px;padding:14px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#334155;font-size:12px;margin-bottom:10px}
    .price{font-size:22px;font-weight:800;margin:10px 0}
    .buy{width:100%;padding:10px 12px;border:0;border-radius:10px;background:var(--green);color:#04110a;font-weight:800;cursor:pointer}
    .hidden{display:none}
    .bar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:end}
    input,select{background:#0f172a;color:var(--text);border:1px solid #334155;border-radius:10px;padding:10px 12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0">eSim Market</h1>
        <div class="muted">Selecciona tu producto</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-target="esimSection" onclick="switchTab('esimSection')">📱 eSIM Digital</button>
      <button class="tab" data-target="physicalSection" onclick="switchTab('physicalSection')">🧾 SIM Física</button>
    </div>

    <div class="panel">
      <section id="esimSection">
        <h2 style="margin:0 0 10px">Catálogo de eSIMs</h2>
        <div id="esimGrid" class="grid"></div>
      </section>

      <section id="physicalSection" class="hidden">
        <h2 style="margin:0 0 10px">Catálogo de SIMs Físicas</h2>
        <div id="physicalGrid" class="grid"></div>
      </section>
    </div>

    <div class="panel" style="margin-top:16px" id="checkoutPanel" class="hidden">
      <h2 style="margin:0 0 12px">Confirmar Compra</h2>
      <div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div><div class="muted">Producto</div><div id="payName">-</div></div>
        <div>
          <div class="muted">Cantidad</div>
          <input id="qty" type="number" min="1" value="1" style="width:60px; padding:4px">
        </div>
        <div><div class="muted">Total a pagar</div><div id="payTotal">0.00 €</div></div>
        <div style="display:flex;align-items:end">
          <button id="confirmBuy" class="buy" style="background:var(--blue);color:white">Pagar</button>
        </div>
      </div>
      <div id="msg" class="muted" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // AQUÍ PONES LOS PRODUCTOS EXACTOS QUE TIENES EN TU BASE DE DATOS DE PYTHON
    // El id de aquí debe coincidir con el product_id de tu db.py
    const products = [
      {id:'esim-1', name:'Europa 10GB', description:'Válido 7 días', price:9.99, type:'esim'},
      {id:'esim-2', name:'Mundo 20GB', description:'Válido 30 días', price:19.99, type:'esim'},
      {id:'phy-1', name:'SIM España 5GB', description:'Envío 24/48h', price:7.50, type:'physical'},
      {id:'phy-2', name:'SIM EU 15GB', description:'Envío 24/48h', price:14.90, type:'physical'}
    ];

    let selectedProduct = null;

    function eur(v){ return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(v); }

    function switchTab(tabId) {
      document.getElementById('esimSection').classList.add('hidden');
      document.getElementById('physicalSection').classList.add('hidden');
      document.getElementById(tabId).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-target="${tabId}"]`).classList.add('active');
    }

    function choose(product) {
      selectedProduct = product;
      document.getElementById('checkoutPanel').classList.remove('hidden');
      document.getElementById('payName').textContent = product.name;
      document.getElementById('qty').value = 1;
      updateTotal();

      document.getElementById('msg').textContent = `Seleccionado: ${product.name} (${product.type === 'esim' ? 'eSIM' : 'SIM física'})`;
    }

    function updateTotal() {
      if(!selectedProduct) return;
      const qty = parseInt(document.getElementById('qty').value) || 1;
      document.getElementById('payTotal').textContent = eur(selectedProduct.price * qty);
    }

    document.getElementById('qty').addEventListener('input', updateTotal);

    function createCard(product) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="badge">${product.type === 'esim' ? '📱 eSIM' : '🧾 FÍSICA'}</div>
        <h3 style="margin:0 0 6px">${product.name}</h3>
        <div class="muted">${product.description}</div>
        <div class="price">${eur(product.price)}</div>
        <button class="buy">Elegir</button>
      `;
      el.querySelector('.buy').addEventListener('click', () => choose(product));
      return el;
    }

    function render() {
      const eGrid = document.getElementById('esimGrid');
      const pGrid = document.getElementById('physicalGrid');

      products.forEach(p => {
        if(p.type === 'esim') eGrid.appendChild(createCard(p));
        else pGrid.appendChild(createCard(p));
      });
    }

    document.getElementById('confirmBuy').addEventListener('click', () => {
      if(!selectedProduct) return;

      const qty = parseInt(document.getElementById('qty').value) || 1;
      const total = +(selectedProduct.price * qty).toFixed(2);

      // EL PAYLOAD EXACTO QUE TU BOT.PY AHORA ESPERA
      const payload = {
        type: 'purchase',
        productId: selectedProduct.id,
        productName: selectedProduct.name,
        quantity: qty,
        unitPrice: selectedProduct.price,
        totalPrice: total,
        typeProduct: selectedProduct.type
      };

      document.getElementById('msg').textContent = "Procesando...";
      tg.sendData(JSON.stringify(payload));
      tg.close();
    });

    render();
  </script>
</body>
</html>
