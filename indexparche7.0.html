<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>AZZ eSIM Market</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #05050F;
    --surface: rgba(13,14,30,.70);
    --border: rgba(139,92,246,.20);
    --primary: #8B5CF6;
    --text: rgba(255,255,255,.93);
    --muted: rgba(200,190,255,.60);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 80px;
  }
  
  /* Contenedores de Vistas */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Header y Botones Básicos */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .btn-back { background: none; border: none; color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; }
  .title { font-size: 20px; font-weight: 800; }

  /* Grid de Productos */
  .prod-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .prod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .prod-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .prod-info p { font-size: 12px; color: var(--muted); }
  .prod-price { font-size: 16px; font-weight: 800; color: var(--primary); }
  
  .btn {
    background: linear-gradient(135deg, #7C3AED, #9333EA);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    margin-top: 10px;
  }

  /* Vista de Carrito Físico */
  .cart-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-top: 20px;
  }
  .cart-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
  .cart-row.total { font-size: 18px; font-weight: 800; border-top: 1px solid var(--border); padding-top: 10px; color: var(--primary); }
  
  .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .qty-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<!-- VISTA PRINCIPAL: MENÚ -->
<div id="view-home" class="view active">
  <div class="header">
    <h1 class="title">eSim Market</h1>
  </div>
  <button class="btn" onclick="switchView('view-esim')" style="margin-bottom:12px;">📱 Comprar eSIM (Digital)</button>
  <button class="btn" onclick="switchView('view-fisica')" style="margin-bottom:12px;">🧾 Comprar SIM Física</button>
  
  <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
    <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--muted);">Otras acciones</h3>
    <button class="btn" onclick="openRecharge()" style="background: #2a2a35; margin-bottom:12px;">💳 Añadir Saldo</button>
    <button class="btn" onclick="openCoupons()" style="background: #2a2a35;">🎟️ Aplicar Cupón</button>
  </div>
</div>

<!-- VISTA: CATÁLOGO ESIM -->
<div id="view-esim" class="view">
  <div class="header">
    <button class="btn-back" onclick="switchView('view-home')">← Volver</button>
    <h2 class="title">Tarifas eSIM</h2>
  </div>
  <div class="prod-grid" id="esim-list">
    <!-- Se rellena por JS -->
  </div>
</div>

<!-- VISTA: CATÁLOGO FÍSICO -->
<div id="view-fisica" class="view">
  <div class="header">
    <button class="btn-back" onclick="switchView('view-home')">← Volver</button>
    <h2 class="title">SIM Físicas</h2>
  </div>
  <div class="prod-grid" id="fisica-list">
    <!-- Se rellena por JS -->
  </div>
</div>

<!-- VISTA: CARRITO FÍSICO -->
<div id="view-cart" class="view">
  <div class="header">
    <button class="btn-back" onclick="switchView('view-fisica')">← Seguir comprando</button>
    <h2 class="title">Tu Cesta</h2>
  </div>
  
  <div id="cart-items"></div>
  
  <div class="cart-summary">
    <div class="cart-row">
      <span>Subtotal Productos:</span>
      <span id="cart-subtotal">0.00 €</span>
    </div>
    <div class="cart-row">
      <span>Envío InPost (Fijo):</span>
      <span>5.00 €</span>
    </div>
    <div class="cart-row total">
      <span>Total a Pagar:</span>
      <span id="cart-total">0.00 €</span>
    </div>
    <button class="btn" onclick="confirmPhysicalPurchase()" style="margin-top: 20px;">✅ Confirmar y Pagar</button>
  </div>
</div>

<script>
  const TG = window.Telegram?.WebApp;
  if (TG) {
    TG.ready();
    TG.expand();
    TG.setBackgroundColor('#05050F');
  }

  // --- DATOS SIMULADOS (En producción podrías inyectarlos desde el bot) ---
  const productsEsim = [
    { id: 'esim_es_10gb', name: 'España 10GB (eSIM)', desc: '10GB a velocidad 5G', price: 10.00 },
    { id: 'esim_eu_20gb', name: 'Europa 20GB (eSIM)', desc: 'Roaming en toda Europa', price: 15.00 }
  ];
  
  const productsFisica = [
    { id: 'sim_es_illim', name: 'España Ilimitada (Física)', desc: 'SIM física enviada a casa', price: 12.00 },
    { id: 'sim_eu_50gb', name: 'Europa 50GB (Física)', desc: 'SIM física para Europa', price: 18.00 }
  ];

  // --- ESTADO DEL CARRITO FÍSICO ---
  let cart = [];
  const SHIPPING_COST = 5.00;

  // --- NAVEGACIÓN ---
  function switchView(viewId) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    
    if(viewId === 'view-esim') renderEsims();
    if(viewId === 'view-fisica') renderFisicas();
    if(viewId === 'view-cart') renderCart();
  }

  // --- RENDERIZADO DE CATÁLOGOS ---
  function renderEsims() {
    const list = document.getElementById('esim-list');
    list.innerHTML = productsEsim.map(p => `
      <div class="prod-card">
        <div class="prod-info">
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <button class="btn" onclick="buyEsim('${p.id}', '${p.name}', ${p.price})">Comprar ahora</button>
        </div>
        <div class="prod-price">${p.price.toFixed(2)} €</div>
      </div>
    `).join('');
  }

  function renderFisicas() {
    const list = document.getElementById('fisica-list');
    list.innerHTML = productsFisica.map(p => `
      <div class="prod-card">
        <div class="prod-info">
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <button class="btn" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">Añadir a cesta</button>
        </div>
        <div class="prod-price">${p.price.toFixed(2)} €</div>
      </div>
    `).join('');
    
    if (cart.length > 0) {
      list.innerHTML += `<button class="btn" onclick="switchView('view-cart')" style="background:#22C55E; margin-top:20px;">🛒 Ver cesta (${cart.length})</button>`;
    }
  }

  // --- LÓGICA ESIM (COMPRA DIRECTA) ---
  function buyEsim(id, name, price) {
    if(!confirm(`¿Confirmas la compra de ${name} por ${price.toFixed(2)}€?`)) return;
    
    sendToBot({
      type: "purchase",
      typeProduct: "esim",
      productId: id,
      productName: name,
      quantity: 1,
      unitPrice: price,
      totalPrice: price,
      discountAmount: 0
    });
  }

  // --- LÓGICA FÍSICAS (CARRITO) ---
  function addToCart(id, name, price) {
    let item = cart.find(i => i.id === id);
    if(item) {
      item.qty += 1;
    } else {
      cart.push({ id, name, price, qty: 1 });
    }
    switchView('view-cart');
  }

  function updateQty(id, delta) {
    let item = cart.find(i => i.id === id);
    if(!item) return;
    item.qty += delta;
    if(item.qty <= 0) {
      cart = cart.filter(i => i.id !== id);
    }
    if(cart.length === 0) {
      switchView('view-fisica');
      return;
    }
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    let subtotal = 0;
    
    container.innerHTML = cart.map(item => {
      let itemTotal = item.price * item.qty;
      subtotal += itemTotal;
      return `
        <div class="prod-card" style="margin-bottom:10px;">
          <div>
            <h3 style="font-size:14px;font-weight:700;">${item.name}</h3>
            <div class="qty-controls">
              <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
              <span>${item.qty}</span>
              <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
            </div>
          </div>
          <div style="font-weight:800; color:var(--primary);">${itemTotal.toFixed(2)} €</div>
        </div>
      `;
    }).join('');

    let total = subtotal + SHIPPING_COST;
    document.getElementById('cart-subtotal').textContent = `${subtotal.toFixed(2)} €`;
    document.getElementById('cart-total').textContent = `${total.toFixed(2)} €`;
  }

  function confirmPhysicalPurchase() {
    if(cart.length === 0) return;
    
    let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    let total = subtotal + SHIPPING_COST;
    
    // Convertimos el carrito a un string descriptivo para productName (o puedes mandar el array si modificas el bot)
    let summaryNames = cart.map(i => `${i.qty}x ${i.name}`).join(', ');

    sendToBot({
      type: "purchase",
      typeProduct: "physical",
      productId: "cart_physical", // Identificador genérico para carrito
      productName: `Cesta Física: ${summaryNames} (+ Envío InPost)`,
      quantity: 1, // Consideramos la cesta como 1 paquete
      unitPrice: subtotal, 
      totalPrice: total,   // El backend procesará este total exacto que ya incluye los 5€
      discountAmount: 0
    });
  }

  // --- ACCIONES SIMPLES (RECARGA / CUPÓN) ---
  function openRecharge() {
    let amount = prompt("¿Cuánto saldo deseas añadir? (Ej: 10.50)");
    if(!amount || isNaN(parseFloat(amount))) return;
    sendToBot({ type: "add_balance", amount: parseFloat(amount) });
  }

  function openCoupons() {
    let code = prompt("Introduce tu código de cupón:");
    if(!code) return;
    sendToBot({ type: "apply_coupon", code: code });
  }

  // --- COMUNICACIÓN CON EL BOT ---
  function sendToBot(payload) {
    if (TG && typeof TG.sendData === 'function') {
      TG.sendData(JSON.stringify(payload));
    } else {
      console.log("Datos que irían al bot:", payload);
      alert("Enviado al bot (revisa la consola).");
    }
  }
</script>
</body>
</html>
