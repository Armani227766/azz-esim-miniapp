<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eSim Market</title>
  <style>
    :root{--bg:#0b1220;--panel:#111827;--line:#243041;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#22c55e}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}
    .muted{color:var(--muted)}
    .tabs{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
    .tab{padding:10px 14px;border:0;border-radius:12px;background:#243041;color:#fff;cursor:pointer;font-weight:700}
    .tab.active{background:var(--blue)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{background:#0f172a;border:1px solid var(--line);border-radius:16px;padding:14px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#334155;font-size:12px;margin-bottom:10px}
    .price{font-size:22px;font-weight:800;margin:10px 0}
    .buy{width:100%;padding:10px 12px;border:0;border-radius:10px;background:var(--green);color:#04110a;font-weight:800;cursor:pointer}
    .hidden{display:none}
    .bar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:end}
    input,select{background:#0f172a;color:var(--text);border:1px solid #334155;border-radius:10px;padding:10px 12px}
    .small{font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0">eSim Market</h1>
        <div class="muted">Selecciona tu producto</div>
      </div>
      <div class="panel small"><div class="muted">Saldo</div><div id="balanceValue">0.00 €</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-target="esimSection" onclick="switchTab('esimSection')">📱 eSIM Digital</button>
      <button class="tab" data-target="physicalSection" onclick="switchTab('physicalSection')">🧾 SIM Física</button>
    </div>

    <div class="panel">
      <section id="esimSection">
        <h2 style="margin:0 0 10px">Catálogo de eSIMs</h2>
        <div id="esimGrid" class="grid"></div>
      </section>

      <section id="physicalSection" class="hidden">
        <h2 style="margin:0 0 10px">Catálogo de SIMs Físicas</h2>
        <div id="physicalGrid" class="grid"></div>
      </section>
    </div>

    <div class="panel" style="margin-top:16px; display:none" id="checkoutPanel">
      <h2 style="margin:0 0 12px">Confirmar Compra</h2>
      <div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div><div class="muted">Producto</div><div id="payName">-</div></div>
        <div>
          <div class="muted">Cantidad</div>
          <input id="qty" type="number" min="1" value="1" style="width:80px; padding:8px">
        </div>
        <div><div class="muted">Total a pagar</div><div id="payTotal">0.00 €</div></div>
        <div style="display:flex;align-items:end">
          <button id="confirmBuy" class="buy" style="background:var(--blue);color:white">Pagar</button>
        </div>
      </div>
      <div id="msg" class="muted" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return params;
    }

    function decodeProducts() {
      const params = getParams();
      const raw = params.get('products');
      if (!raw) return [];
      try {
        const json = atob(decodeURIComponent(raw));
        const arr = JSON.parse(json);
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return [];
      }
    }

    const params = getParams();
    const balance = parseFloat(params.get('balance') || '0');
    const products = decodeProducts();
    document.getElementById('balanceValue').textContent = balance.toFixed(2) + ' €';

    const esimGrid = document.getElementById('esimGrid');
    const physicalGrid = document.getElementById('physicalGrid');
    const checkoutPanel = document.getElementById('checkoutPanel');
    const payName = document.getElementById('payName');
    const payTotal = document.getElementById('payTotal');
    const qtyInput = document.getElementById('qty');
    const msg = document.getElementById('msg');
    let selected = null;

    function switchTab(id) {
      document.getElementById('esimSection').classList.toggle('hidden', id !== 'esimSection');
      document.getElementById('physicalSection').classList.toggle('hidden', id !== 'physicalSection');
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.target === id));
    }

    function renderCard(p) {
      const card = document.createElement('div');
      card.className = 'card';
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = p.type === 'physical' ? 'SIM Física' : 'eSIM';
      const title = document.createElement('div');
      title.style.fontWeight = '800';
      title.textContent = p.name || 'Sin nombre';
      const desc = document.createElement('div');
      desc.className = 'muted small';
      desc.style.marginTop = '6px';
      desc.textContent = p.description || '';
      const price = document.createElement('div');
      price.className = 'price';
      price.textContent = Number(p.unit_price || 0).toFixed(2) + ' €';
      const buy = document.createElement('button');
      buy.className = 'buy';
      buy.textContent = 'Comprar';
      buy.onclick = () => {
        selected = p;
        payName.textContent = p.name || '-';
        payTotal.textContent = Number(p.unit_price || 0).toFixed(2) + ' €';
        qtyInput.value = 1;
        checkoutPanel.style.display = 'block';
        msg.textContent = '';
        checkoutPanel.scrollIntoView({behavior:'smooth', block:'start'});
      };
      card.appendChild(badge);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(price);
      card.appendChild(buy);
      return card;
    }

    function renderProducts() {
      esimGrid.innerHTML = '';
      physicalGrid.innerHTML = '';
      if (!products.length) {
        esimGrid.innerHTML = '<div class="muted">No hay tarifas disponibles.</div>';
        physicalGrid.innerHTML = '<div class="muted">No hay tarifas disponibles.</div>';
        return;
      }
      products.forEach(p => {
        const type = (p.type || 'esim').toLowerCase();
        const card = renderCard(p);
        if (type === 'physical') physicalGrid.appendChild(card);
        else esimGrid.appendChild(card);
      });
      if (!esimGrid.children.length) esimGrid.innerHTML = '<div class="muted">No hay tarifas eSIM.</div>';
      if (!physicalGrid.children.length) physicalGrid.innerHTML = '<div class="muted">No hay tarifas físicas.</div>';
    }

    qtyInput.addEventListener('input', () => {
      if (!selected) return;
      const q = Math.max(1, parseInt(qtyInput.value || '1', 10));
      payTotal.textContent = (Number(selected.unit_price || 0) * q).toFixed(2) + ' €';
    });

    document.getElementById('confirmBuy').addEventListener('click', () => {
      if (!selected) return;
      const q = Math.max(1, parseInt(qtyInput.value || '1', 10));
      const total = Number(selected.unit_price || 0) * q;
      const payload = {
        type: 'purchase',
        productId: selected.id,
        productName: selected.name,
        unitPrice: Number(selected.unit_price || 0),
        quantity: q,
        totalPrice: total,
        discountAmount: 0,
        typeProduct: (selected.type || 'esim').toLowerCase()
      };
      tg.sendData(JSON.stringify(payload));
      msg.textContent = 'Enviando pedido...';
    });

    renderProducts();
  </script>
</body>
</html>
