    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eSIM Store - Business Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root { --bg-dark:#0a0b10; --card-bg:#12141d; --border-color:rgba(255,255,255,.05); --text-main:#fff; --text-muted:#8b92a5; --accent-green:#00ff88; --accent-green-bg:rgba(0,255,136,.1); --accent-blue:#3b82f6; --accent-blue-bg:rgba(59,130,246,.1); --accent-purple:#8b5cf6; --accent-orange:#f59e0b; }
        *{box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text-main);margin:0;padding:16px 16px 30px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.header h1{font-size:18px;font-weight:600;margin:0;text-align:center;flex-grow:1}.icon-btn{color:var(--text-main);font-size:20px;background:none;border:none}
        .filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.filter-btn{background:var(--card-bg);border:1px solid var(--border-color);color:var(--text-muted);padding:10px 16px;border-radius:12px;font-size:13px;cursor:pointer;flex:1;text-align:center;transition:all .3s ease}.filter-btn.active{background:var(--accent-blue-bg);color:var(--accent-blue);border-color:rgba(59,130,246,.3);font-weight:600}
        .custom-range{display:none;gap:8px;flex-wrap:wrap;margin-bottom:24px}.custom-range input,.custom-range button{border-radius:12px;padding:10px 12px;font-size:13px}.custom-range input{background:var(--card-bg);border:1px solid var(--border-color);color:var(--text-main)}.custom-range button{background:var(--accent-blue);color:#fff;border:none;font-weight:600}
        .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}.kpi-card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:16px}.kpi-card.green{background:linear-gradient(145deg,#12141d,rgba(0,255,136,.05));border-color:rgba(0,255,136,.2)}.kpi-card.blue{background:linear-gradient(145deg,#12141d,rgba(59,130,246,.05));border-color:rgba(59,130,246,.2)}.kpi-title{font-size:11px;text-transform:uppercase;color:var(--text-muted);font-weight:600;letter-spacing:.5px;margin-bottom:8px}.kpi-value{font-size:24px;font-weight:700;margin-bottom:8px}.kpi-card.green .kpi-value{color:var(--accent-green)}.kpi-card.blue .kpi-value{color:var(--accent-blue)}.kpi-trend{font-size:12px;display:flex;align-items:center;gap:4px}.trend-up{color:var(--accent-green)}.trend-down{color:#ef4444}
        .chart-section{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:24px}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.section-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}.section-title i{color:var(--accent-blue)}.canvas-wrapper{position:relative;width:100%}
        .provider-list{list-style:none;padding:0;margin:0}.provider-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-color)}.provider-item:last-child{border-bottom:none}.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-blue-bg);color:var(--accent-blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-right:12px}.provider-info{flex-grow:1}.provider-name{font-size:14px;font-weight:600;margin-bottom:2px}.provider-sub{font-size:12px;color:var(--text-muted)}.provider-stats{text-align:right}.provider-val{font-size:14px;font-weight:600;color:var(--text-main)}
        .donut-container{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:200px}.donut-chart-box{position:relative;width:45%;min-width:180px;height:200px}.donut-center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}.donut-center-text .lbl{font-size:10px;color:var(--text-muted)}.donut-center-text .val{font-size:12px;font-weight:700;color:#fff}.donut-legend{width:50%;font-size:11px;display:flex;flex-direction:column;gap:12px}.legend-item{display:flex;justify-content:space-between;align-items:center;gap:10px}.legend-label{display:flex;align-items:center;gap:6px;color:var(--text-muted);min-width:0}.legend-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}.legend-value{color:#fff;font-weight:600;white-space:nowrap}
    </style>
</head>
<body>
    <div class="header"><i class="fas fa-bars icon-btn"></i><h1>Dashboard</h1><i class="fas fa-bell icon-btn" style="position:relative;"><span style="position:absolute;top:-4px;right:-4px;background:var(--accent-purple);width:8px;height:8px;border-radius:50%"></span></i></div>
    <div class="filter-row" id="time-filters"><div class="filter-btn active" data-filter="7">Últimos 7 días</div><div class="filter-btn" data-filter="30">30 días</div><div class="filter-btn" data-filter="custom">Histórico</div></div>
    <div class="custom-range" id="custom-range"><input type="date" id="dateStart"><span style="opacity:.5;align-self:center">a</span><input type="date" id="dateEnd"><button id="applyRangeBtn">Aplicar</button></div>
    <div class="kpi-grid"><div class="kpi-card green"><div class="kpi-title">Ingresos Reales</div><div class="kpi-value" id="val-ingresos">€ 0.00</div><div class="kpi-trend" id="trend-ingresos">--</div></div><div class="kpi-card blue"><div class="kpi-title">Ventas (eSIMs)</div><div class="kpi-value" id="val-ventas">0</div><div class="kpi-trend" id="trend-ventas">--</div></div></div>
    <div class="chart-section"><div class="section-header"><div class="section-title"><i class="fas fa-chart-line"></i> Subidas vs Vendidas</div></div><div class="canvas-wrapper" style="height:220px"><canvas id="lineChart"></canvas></div></div>
    <div class="chart-section"><div class="section-header"><div class="section-title"><i class="fas fa-chart-pie"></i> Fuentes de Pago</div></div><div class="donut-container"><div class="donut-chart-box"><canvas id="doughnutChart"></canvas><div class="donut-center-text"><div class="lbl">Total</div><div class="val" id="donut-total">€ 0</div></div></div><div class="donut-legend" id="donut-legend-box"></div></div></div>
    <div class="chart-section"><div class="section-header"><div class="section-title"><i class="fas fa-user-tie"></i> Proveedores / Staff</div><span style="font-size:12px;color:var(--text-muted);background:rgba(255,255,255,.1);padding:4px 8px;border-radius:8px">Ver todos</span></div><ul class="provider-list" id="staff-list"></ul></div>
    <script>
        if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); window.Telegram.WebApp.setHeaderColor('#0a0b10'); window.Telegram.WebApp.setBackgroundColor('#0a0b10'); }
        let rawData = { o: [], u: [], c: [] }, lineChartInstance = null, doughnutChartInstance = null, currentMode = '7';
        const urlParams = new URLSearchParams(window.location.search); const dataParam = urlParams.get('data');
        if (dataParam) { try { const parsed = JSON.parse(decodeURIComponent(escape(atob(dataParam)))); rawData = { o: parsed.o || [], u: parsed.u || [], c: parsed.c || [] }; } catch (e) { console.error('Error descodificando base64:', e); } }
        Chart.defaults.color = '#8b92a5'; Chart.defaults.font.family = 'Inter'; Chart.defaults.plugins.tooltip.backgroundColor = '#12141d'; Chart.defaults.plugins.tooltip.borderColor = 'rgba(255,255,255,0.1)'; Chart.defaults.plugins.tooltip.borderWidth = 1;
        function getRangeDates() { const now = new Date(); const end = new Date(now); const start = new Date(now); if (currentMode === '7') start.setDate(now.getDate() - 7); else if (currentMode === '30') start.setDate(now.getDate() - 30); else return { start: document.getElementById('dateStart').value || '', end: document.getElementById('dateEnd').value || '' }; return { start: start.toISOString().split('T')[0], end: end.toISOString().split('T')[0] }; }
        function setActiveFilter(mode) { currentMode = mode; document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === mode)); document.getElementById('custom-range').style.display = mode === 'custom' ? 'flex' : 'none'; if (mode !== 'custom') updateDashboard(); }
        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => setActiveFilter(btn.dataset.filter)));
        document.getElementById('applyRangeBtn').addEventListener('click', () => { if (!document.getElementById('dateStart').value || !document.getElementById('dateEnd').value) return; updateDashboard(); });
        function fmtTrend(newVal, oldVal) { if (oldVal === 0 && newVal === 0) return '<span class="trend-up" style="color:var(--text-muted)"><i class="fas fa-minus"></i> 0%</span>'; if (oldVal === 0) return '<span class="trend-up"><i class="fas fa-arrow-trend-up"></i> +100%</span> vs anterior'; const pct = ((newVal - oldVal) / oldVal) * 100; if (pct >= 0) return `<span class="trend-up"><i class="fas fa-arrow-trend-up"></i> +${pct.toFixed(1)}%</span> vs anterior`; return `<span class="trend-down"><i class="fas fa-arrow-trend-down"></i> ${pct.toFixed(1)}%</span> vs anterior`; }
        function updateDashboard() { const { start, end } = getRangeDates(); const fOrders = rawData.o.filter(item => (!start || item.d >= start) && (!end || item.d <= end)); const fUploads = rawData.u.filter(item => (!start || item.d >= start) && (!end || item.d <= end)); const fRecharges = rawData.c.filter(item => (!start || item.d >= start) && (!end || item.d <= end)); const totalRev = fRecharges.reduce((acc, curr) => acc + Number(curr.r || 0), 0); const totalQty = fOrders.reduce((acc, curr) => acc + Number(curr.q || 0), 0); document.getElementById('val-ingresos').innerText = '€ ' + totalRev.toLocaleString('en-US', { minimumFractionDigits: 2 }); document.getElementById('val-ventas').innerText = totalQty; document.getElementById('trend-ingresos').innerHTML = fmtTrend(totalRev, 0); document.getElementById('trend-ventas').innerHTML = fmtTrend(totalQty, 0); document.getElementById('donut-total').innerText = '€ ' + totalRev.toLocaleString('en-US', { minimumFractionDigits: 2 }); const datesSet = new Set([...fOrders.map(x => x.d), ...fUploads.map(x => x.d)]); const datesArr = Array.from(datesSet).sort(); const ventasPorDia = datesArr.map(d => fOrders.filter(x => x.d === d).reduce((sum, x) => sum + Number(x.q || 0), 0)); const subidasPorDia = datesArr.map(d => fUploads.filter(x => x.d === d).reduce((sum, x) => sum + Number(x.q || 0), 0)); if (lineChartInstance) lineChartInstance.destroy(); lineChartInstance = new Chart(document.getElementById('lineChart').getContext('2d'), { type: 'line', data: { labels: datesArr.map(d => { const p = d.split('-'); return `${p[2]}/${p[1]}`; }), datasets: [{ label: 'Vendidas', data: ventasPorDia, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,.1)', borderWidth: 2, tension: .4, pointRadius: 3, pointBackgroundColor: '#00ff88', fill: true }, { label: 'Subidas', data: subidasPorDia, borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.1)', borderWidth: 2, tension: .4, pointRadius: 3, pointBackgroundColor: '#8b5cf6', fill: true }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', align: 'start', labels: { boxWidth: 8, usePointStyle: true } } }, scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true } } } }); const revMap = {}; fOrders.forEach(o => { const k = o.p || 'Sin nombre'; revMap[k] = (revMap[k] || 0) + Number(o.r || 0); }); const topSources = Object.keys(revMap).sort((a, b) => revMap[b] - revMap[a]).slice(0, 4); const topVals = topSources.map(p => revMap[p]); const colors = ['#00ff88', '#3b82f6', '#f59e0b', '#8b5cf6']; if (doughnutChartInstance) doughnutChartInstance.destroy(); doughnutChartInstance = new Chart(document.getElementById('doughnutChart').getContext('2d'), { type: 'doughnut', data: { labels: topSources, datasets: [{ data: topVals, backgroundColor: colors, borderWidth: 0, cutout: '75%' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); const donutTotalRev = topVals.reduce((a, b) => a + b, 0) || 1; document.getElementById('donut-legend-box').innerHTML = topSources.length ? topSources.map((source, i) => { const val = topVals[i]; const pct = ((val / donutTotalRev) * 100).toFixed(1); return `<div class="legend-item"><div class="legend-label"><div class="legend-dot" style="background:${colors[i]}"></div><span style="width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${source}</span><span style="color:#fff;opacity:.7;margin-left:4px">${pct}%</span></div><div class="legend-value">€ ${val.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div></div>`; }).join('') : '<div style="color:var(--text-muted)">Sin datos</div>'; const staffMap = {}; fUploads.forEach(u => { const a = u.a || 'Sin nombre'; if (!staffMap[a]) staffMap[a] = { q: 0, items: {} }; staffMap[a].q += Number(u.q || 0); const p = u.p || 'Tarifa'; staffMap[a].items[p] = (staffMap[a].items[p] || 0) + Number(u.q || 0); }); const staffList = document.getElementById('staff-list'); if (Object.keys(staffMap).length === 0) staffList.innerHTML = '<li class="provider-item"><span style="color:var(--text-muted)">No hay subidas en este periodo.</span></li>'; else staffList.innerHTML = Object.entries(staffMap).map(([admin, data]) => { const desc = Object.entries(data.items).map(([p, q]) => `${q}x ${p}`).join(', '); return `<li class="provider-item"><div class="avatar">${admin.substring(0,2).toUpperCase()}</div><div class="provider-info"><div class="provider-name">${admin} <i class="fas fa-check-circle" style="color:var(--accent-blue);font-size:12px"></i></div><div class="provider-sub">${desc || 'Sin detalle'}</div></div><div class="provider-stats"><div class="provider-val">${data.q} <i class="fas fa-cloud-upload-alt" style="color:var(--accent-purple);font-size:12px"></i></div><div class="provider-sub">Subidas</div></div></li>`; }).join(''); }
        window.onload = () => { const now = new Date(); const d1 = new Date(now); d1.setDate(now.getDate() - 7); document.getElementById('dateStart').value = d1.toISOString().split('T')[0]; document.getElementById('dateEnd').value = now.toISOString().split('T')[0]; updateDashboard(); };
    </script>
</body>
</html>
