<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Administración v7.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: linear-gradient(135deg, #15161c 0%, #1e222d 100%);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }
        .text-accent {
            color: #b89aff;
        }
    </style>
</head>
<body>

    <h1 class="text-2xl font-bold mb-6 text-center text-accent">Dashboard v7.0</h1>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card text-center">
            <p class="text-sm text-gray-400">Ventas</p>
            <p class="text-2xl font-bold" id="totalVentas">-</p>
            <p class="text-xs text-green-400 mt-1" id="sumVentas">€0.00</p>
        </div>
        <div class="card text-center">
            <p class="text-sm text-gray-400">Recargas</p>
            <p class="text-2xl font-bold" id="totalRecargas">-</p>
            <p class="text-xs text-green-400 mt-1" id="sumRecargas">€0.00</p>
        </div>
        <div class="card text-center">
            <p class="text-sm text-gray-400">Stock Añadido</p>
            <p class="text-2xl font-bold" id="totalStock">-</p>
        </div>
        <div class="card text-center">
            <p class="text-sm text-gray-400">Comisiones</p>
            <p class="text-2xl font-bold" id="totalComisiones">-</p>
            <p class="text-xs text-green-400 mt-1" id="sumComisiones">€0.00</p>
        </div>
    </div>

    <!-- Chart Contenedor -->
    <div class="card">
        <canvas id="mainChart" height="250"></canvas>
    </div>

    <script>
        // ----------------------------------------------------
        // 1. REEMPLAZA ESTA URL POR LA IP O DOMINIO DE TU VPS
        // ----------------------------------------------------
        const API_URL = "https://TU-IP-O-DOMINIO.com/api/admin-stats?token=esim2026";
        
        let chartInstance = null;

        function renderDashboard(data) {
            // Arrays traidos desde la nueva API
            const orders = data.o || [];
            const recharges = data.c || [];
            const uploads = data.u || [];
            const commissions = data.comms || [];

            // Totales e importes
            const numOrders = orders.length;
            const numRecharges = recharges.length;
            const numUploads = uploads.length;
            const numCommissions = commissions.length;

            const sumOrders = orders.reduce((acc, curr) => acc + (parseFloat(curr.r) || 0), 0);
            const sumRecharges = recharges.reduce((acc, curr) => acc + (parseFloat(curr.r) || 0), 0);
            const sumCommissions = commissions.reduce((acc, curr) => acc + (parseFloat(curr.a) || 0), 0);

            // Actualizar tarjetas HTML
            document.getElementById('totalVentas').innerText = numOrders;
            document.getElementById('sumVentas').innerText = "€" + sumOrders.toFixed(2);

            document.getElementById('totalRecargas').innerText = numRecharges;
            document.getElementById('sumRecargas').innerText = "€" + sumRecharges.toFixed(2);

            document.getElementById('totalStock').innerText = numUploads;

            document.getElementById('totalComisiones').innerText = numCommissions;
            document.getElementById('sumComisiones').innerText = "€" + sumCommissions.toFixed(2);

            // Preparar datos para el gráfico (Agrupados por fecha)
            const datesMap = {};

            orders.forEach(o => {
                if(!datesMap[o.d]) datesMap[o.d] = { ventas: 0, recargas: 0 };
                datesMap[o.d].ventas += parseFloat(o.r) || 0;
            });

            recharges.forEach(r => {
                if(!datesMap[r.d]) datesMap[r.d] = { ventas: 0, recargas: 0 };
                datesMap[r.d].recargas += parseFloat(r.r) || 0;
            });

            // Ordenar fechas
            const sortedDates = Object.keys(datesMap).sort();
            
            const labelDates = sortedDates.map(d => d.substring(5)); // Solo MM-DD
            const dataVentas = sortedDates.map(d => datesMap[d].ventas);
            const dataRecargas = sortedDates.map(d => datesMap[d].recargas);

            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelDates,
                    datasets: [
                        {
                            label: 'Ventas (€)',
                            data: dataVentas,
                            borderColor: '#b89aff',
                            backgroundColor: 'rgba(184, 154, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Recargas (€)',
                            data: dataRecargas,
                            borderColor: '#2ed573',
                            backgroundColor: 'rgba(46, 213, 115, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    },
                    scales: {
                        x: { ticks: { color: '#8b8e98' }, grid: { display: false } },
                        y: { ticks: { color: '#8b8e98' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        // Cargar datos al entrar a la página
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert("Error en la API: " + data.error);
                } else {
                    renderDashboard(data);
                }
            })
            .catch(e => {
                console.error("Error al cargar la API:", e);
                alert("No se pudo conectar a la base de datos.");
            });

    </script>
</body>
</html>
