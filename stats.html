<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --accent: #3b82f6;
            --glass-border: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --card-bg: rgba(30, 41, 59, 0.85);
                --glass-border: rgba(255, 255, 255, 0.05);
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
            transition: background 0.3s ease;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card h2 {
            margin: 0 0 8px 0;
            font-size: 13px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 30px 0 15px 0;
        }
        .chart-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .canvas-wrapper { position: relative; height: 200px; width: 100%; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--glass-border);
            align-items: center;
        }
        li:last-child { border-bottom: none; }
        .flex-col { display: flex; flex-direction: column; }
        .text-bold { font-weight: 600; font-size: 15px; }
        .text-sm { font-size: 12px; opacity: 0.7; }
        .text-accent { color: var(--accent); font-weight: 700; font-size: 16px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <!-- Tarjetas -->
    <div class="grid-cards">
        <div class="card">
            <h2>Ingresos Reales</h2>
            <div class="value" id="val-ingresos">0 €</div>
        </div>
        <div class="card">
            <h2>eSIMs Vendidas</h2>
            <div class="value" id="val-ventas">0</div>
        </div>
    </div>

    <div class="section-title">Ingresos Reales por Día</div>
    <div class="chart-box">
        <div class="canvas-wrapper"><canvas id="historyChart"></canvas></div>
    </div>

    <div class="section-title">Top Tarifas (Por Gasto de Saldo)</div>
    <div class="chart-box">
        <div class="canvas-wrapper"><canvas id="revenueChart"></canvas></div>
    </div>

    <div class="section-title">Ranking (Detalle)</div>
    <div class="chart-box">
        <ul id="staff-list"></ul>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        let stats = null;
        let charts = {};

        // Extraer datos de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        
        if (dataParam) {
            try {
                stats = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
            } catch (e) {
                console.error("Error al leer datos:", e);
                document.body.innerHTML = '<h3 style="text-align:center; margin-top:50px;">Error decodificando datos del bot.</h3>';
            }
        }

        if (stats) {
            // Rellenar tarjetas
            document.getElementById('val-ingresos').innerText = (stats.ingresos_totales || 0).toFixed(2) + ' €';
            document.getElementById('val-ventas').innerText = stats.esims_vendidas || 0;

            // Gráfica de Ingresos Reales Diarios
            const histIngresos = stats.historico_ingresos || [];
            const fechas = histIngresos.map(h => h.fecha);
            const ingresos = histIngresos.map(h => h.ingresos);
            drawChart('historyChart', 'line', fechas, ingresos, 'Ingresos (€)');

            // Gráfica Doughnut (Top 5)
            const ranking = stats.ranking || [];
            const prodNames = ranking.map(r => r.product_name);
            const prodRevenue = ranking.map(r => r.recaudado);
            drawChart('revenueChart', 'doughnut', prodNames, prodRevenue, 'Saldo Gastado');

            // Lista detallada (Top Tarifas en texto)
            const staffList = document.getElementById('staff-list');
            staffList.innerHTML = '';
            
            if(ranking.length === 0) {
                staffList.innerHTML = '<li class="text-sm">No hay ventas registradas.</li>';
            } else {
                ranking.forEach(r => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div style="display:flex; gap:12px; align-items:center;">
                            <div class="flex-col">
                                <span class="text-bold">${r.product_name}</span>
                                <span class="text-sm">${r.cantidad} uds vendidas</span>
                            </div>
                        </div>
                        <div class="text-accent">${r.recaudado.toFixed(2)} €</div>
                    `;
                    staffList.appendChild(li);
                });
            }
        } else {
            document.body.innerHTML = '<h3 style="text-align:center; margin-top:50px;">No se recibieron datos. Abre esto desde el Bot.</h3>';
        }

        function drawChart(id, type, labels, data, labelName) {
            const ctx = document.getElementById(id).getContext('2d');
            const isLine = type === 'line';
            let bg = isLine ? 'rgba(59, 130, 246, 0.2)' : ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            let border = isLine ? '#3b82f6' : 'transparent';

            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelName,
                        data: data,
                        backgroundColor: bg,
                        borderColor: border,
                        borderWidth: isLine ? 3 : 0,
                        fill: isLine,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: !isLine, position: 'right' } },
                    scales: isLine ? { x: { grid: { display: false } }, y: { beginAtZero: true } } : {}
                }
            });
        }
    </script>
</body>
</html>
