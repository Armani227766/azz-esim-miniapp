<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Business</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-dark: #0a0b10;
            --card-bg: #12141d;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            
            --accent-green: #00ff88;
            --accent-green-bg: rgba(0, 255, 136, 0.1);
            
            --accent-blue: #3b82f6;
            --accent-blue-bg: rgba(59, 130, 246, 0.1);
            
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px; /* Espacio para botones fijos si los hay */
        }

        /* Cabecera */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }
        .icon-btn {
            color: var(--text-main);
            font-size: 20px;
            background: none;
            border: none;
        }

        /* Barra de Filtros */
        .filter-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex: 1;
        }

        /* Tarjetas Superiores */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        .kpi-card.green { background: linear-gradient(145deg, #12141d, rgba(0, 255, 136, 0.05)); border-color: rgba(0, 255, 136, 0.2); }
        .kpi-card.blue { background: linear-gradient(145deg, #12141d, rgba(59, 130, 246, 0.05)); border-color: rgba(59, 130, 246, 0.2); }
        
        .kpi-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px;}
        .kpi-value { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .kpi-card.green .kpi-value { color: var(--accent-green); }
        .kpi-card.blue .kpi-value { color: var(--accent-blue); }
        
        .kpi-trend { font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .trend-up { color: var(--accent-green); }

        /* Contenedores de Gráficas */
        .chart-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--accent-blue); }

        .canvas-wrapper { position: relative; height: 180px; width: 100%; }

        /* Lista de Proveedores (Staff) */
        .provider-list { list-style: none; padding: 0; margin: 0; }
        .provider-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .provider-item:last-child { border-bottom: none; }
        
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent-blue-bg); color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; margin-right: 12px;
        }
        .provider-info { flex-grow: 1; }
        .provider-name { font-size: 14px; font-weight: 600; margin-bottom: 2px;}
        .provider-sub { font-size: 12px; color: var(--text-muted); }
        
        .provider-stats { text-align: right; }
        .provider-val { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .provider-val.highlight { color: var(--accent-purple); }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <i class="fas fa-bars icon-btn"></i>
        <h1>Dashboard</h1>
        <i class="fas fa-bell icon-btn" style="position:relative;">
            <span style="position:absolute; top:-4px; right:-4px; background:var(--accent-purple); width:8px; height:8px; border-radius:50%;"></span>
        </i>
    </div>

    <!-- Filtros estéticos (puedes programarlos luego si quieres) -->
    <div class="filter-row">
        <div class="filter-btn">Hoy, 24 de Mayo <i class="fas fa-chevron-down"></i></div>
        <div class="filter-btn" style="flex: 0.5;">Filtros <i class="fas fa-filter"></i></div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
        <div class="kpi-card green">
            <div class="kpi-title">Ingresos Reales</div>
            <div class="kpi-value" id="val-ingresos">€ 0.00</div>
            <div class="kpi-trend trend-up"><i class="fas fa-arrow-trend-up"></i> <span>Activo</span></div>
        </div>
        <div class="kpi-card blue">
            <div class="kpi-title">Ventas</div>
            <div class="kpi-value" id="val-ventas">0</div>
            <div class="kpi-trend trend-up"><i class="fas fa-arrow-trend-up"></i> <span>Total</span></div>
        </div>
    </div>

    <!-- Gráfica Combinada -->
    <div class="chart-section">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-chart-line"></i> Subidas vs Vendidas</div>
            <span style="font-size: 12px; color: var(--text-muted);">Diario <i class="fas fa-chevron-down"></i></span>
        </div>
        <div class="canvas-wrapper" style="height: 220px;">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <!-- Gráfica Fuentes de Pago (Top Tarifas) -->
    <div class="chart-section">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-chart-pie"></i> Top Tarifas (Ingresos)</div>
        </div>
        <div class="canvas-wrapper" style="height: 200px; display: flex; justify-content: center;">
            <canvas id="doughnutChart"></canvas>
        </div>
    </div>

    <!-- Proveedores (Staff) -->
    <div class="chart-section">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-user-tie"></i> Proveedores / Staff</div>
            <span style="font-size: 12px; color: var(--text-muted); background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 8px;">Ver todos</span>
        </div>
        <ul class="provider-list" id="staff-list">
            <!-- Rellenado por JS -->
        </ul>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#0a0b10');

        let rawData = { o: [], u: [], c: [] };

        // Extraer datos iniciales
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        if (dataParam) {
            try {
                const parsed = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
                rawData = { o: parsed.o || [], u: parsed.u || [], c: parsed.c || [] };
            } catch (e) { console.error(e); }
        }

        function initDashboard() {
            // Totales
            const totalRev = rawData.c.reduce((acc, curr) => acc + curr.r, 0); 
            const totalQty = rawData.o.reduce((acc, curr) => acc + curr.q, 0);
            
            document.getElementById('val-ingresos').innerText = '€ ' + totalRev.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('val-ventas').innerText = totalQty;

            // Preparar Gráfica de Líneas (Ventas vs Subidas por día)
            const datesSet = new Set([...rawData.o.map(x=>x.d), ...rawData.u.map(x=>x.d)]);
            const datesArr = Array.from(datesSet).sort();
            
            const ventasPorDia = datesArr.map(d => rawData.o.filter(x => x.d === d).reduce((sum, x) => sum + x.q, 0));
            const subidasPorDia = datesArr.map(d => rawData.u.filter(x => x.d === d).reduce((sum, x) => sum + x.q, 0));

            // Configurar Chart.js por defecto (Dark Mode)
            Chart.defaults.color = '#8b92a5';
            Chart.defaults.font.family = 'Inter';

            // Dibujar Gráfica de Líneas
            new Chart(document.getElementById('lineChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: datesArr.map(d => d.slice(-5)), // Mostrar solo mes-día
                    datasets: [
                        {
                            label: 'Vendidas',
                            data: ventasPorDia,
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0, 255, 136, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: '#00ff88'
                        },
                        {
                            label: 'Subidas',
                            data: subidasPorDia,
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: '#8b5cf6'
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', align: 'start', labels: { boxWidth: 10, usePointStyle: true } } },
                    scales: { 
                        x: { grid: { display: false, drawBorder: false } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, beginAtZero: true }
                    }
                }
            });

            // Preparar Gráfica de Anillo (Top Tarifas)
            const prodMap = {};
            rawData.o.forEach(o => { prodMap[o.p] = (prodMap[o.p] || 0) + o.r; });
            const topProds = Object.keys(prodMap).sort((a, b) => prodMap[b] - prodMap[a]).slice(0, 4);
            const topVals = topProds.map(p => prodMap[p]);

            new Chart(document.getElementById('doughnutChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: topProds,
                    datasets: [{
                        data: topVals,
                        backgroundColor: ['#00ff88', '#3b82f6', '#f59e0b', '#8b5cf6'],
                        borderWidth: 0,
                        cutout: '75%'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#fff', padding: 20, usePointStyle: true, pointStyle: 'circle' } } }
                }
            });

            // Rellenar Staff / Proveedores
            const staffMap = {};
            rawData.u.forEach(u => {
                staffMap[u.a] = (staffMap[u.a] || 0) + u.q;
            });
            const staffList = document.getElementById('staff-list');
            if(Object.keys(staffMap).length === 0) {
                staffList.innerHTML = '<li class="provider-item"><span class="text-muted">No hay actividad.</span></li>';
            } else {
                for (const [admin, qty] of Object.entries(staffMap)) {
                    staffList.innerHTML += `
                        <li class="provider-item">
                            <div class="avatar">${admin.substring(0,2).toUpperCase()}</div>
                            <div class="provider-info">
                                <div class="provider-name">${admin} <i class="fas fa-check-circle" style="color:var(--accent-blue); font-size:12px;"></i></div>
                                <div class="provider-sub">@${admin.toLowerCase()}</div>
                            </div>
                            <div class="provider-stats">
                                <div class="provider-val">${qty} <i class="fas fa-cloud-upload-alt" style="color:var(--accent-purple); font-size:12px;"></i></div>
                                <div class="provider-sub">Subidas</div>
                            </div>
                        </li>
                    `;
                }
            }
        }

        initDashboard();
    </script>
</body>
</html>
